// ===== Firebase (מפתח הענן של גלוברנס) =====

const firebaseConfig = {

let fbApp, auth, db;

  } catch (e) { db = getFirestore(fbApp); }
} catch (e) { console.error("Firebase init error:", e); }

// ===== נתוני בסיס =====
const INITIAL_CONTACTS = [

  { id: '2', name: 'שחר', phone: '053-5260311', orderIndex: 1 },
  { id: '3', name: 'שלום', phone: '054-4851718', orderIndex: 2 },
  { id: '4', name: 'מוריס', phone: '054-2391926', orderIndex: 3 },
];

const RAW_PRODUCTS = [
  "חלב 2 ליטר - 3","חלב מעושר - 1","חלב טבעי - 1","חלב אדום - 1","חלב כתום - 1",
  "שוקו ליטר - 1","שוקו ליטר מוקה - 6 י״ח","שוקו ליטר אייס קפה - 6 י״ח","שוקו ליטר בננה - 6 י״ח",
  "טופו - 1","מעדן דנונה תות - 1","מעדן דנונה פירות יער - 1","שוקו שקית - 3","מוקה שקית - 1",
  "מלקי שוקולד - 2","מלקי טופ עדשים - 10 י״ח","מלקי טופ מגולגלת - 10 י״ח","מלקי טריו פיסטוק - 12 י״ח",
  "מלקי טריו - 12 י״ח","מלקי תות - 12 י״ח","מלקי וניל - 12 י״ח","מלקי פסק זמן - 12 י״ח",
  "מלקי קצפת קפוצינו - 12 י״ח","מלקי קפוצינו - 12 י״ח","דניאלה וניל - 1","דניאל תות - 2",
  "דניאלה תות בננה - 1","גבינה - 1","קוטג״ - 1","גבינה 500 - 6 י״ח","שמנת - 1",
  "מעדן הגולן שוקולד - 12 י״ח","מעדן הגולן וניל - 12 י״ח","מעדן הגולן מוקה - 12 י״ח",
  "דני וניל - 1","דני שוקולד - 1","דני שלוק - 1","גמדים ירוק - 6 י״ח","גמדים צהוב - 6 י״ח",
  "גמדים סקוואיז צהוב - 1","גמדים סקוואיז אדום - 1","סמפונייה שמנת - 3 י״ח","סימפוניה שום שמיר - 3 י״ח",
  "סמפוניה זתים - 3 י״ח","סמפוניה שיבקע - 3 י״ח","דנונה ביו 0% - 12 י״ח","דנונה ביו 1.7% - 12 י״ח",
  "דנונה ביו 3% - 12 י״ח","דנונה ביו מולטי - 12 י״ח","דנונה מולטי תפוח - 12 י״ח","דנונה מתיקות מעודנת - 12 י״ח",
  "דנונה אקטיביה שזיף שיבולת שועל - 12 י״ח","יוגורט יווני - 12 י״ח","סקי תות - 12 י״ח","סקי וניל - 12 י״ח",
  "דנונה קראנצ פצפוצים - 12 י״ח","דנונה קראנצ פקאן - 12 י״ח","דנונה קראנצ תות - 12 י״ח","משקה דנונה תות בננה- 1",
  "אייס קפה - 350 מ״ל -1","שוקו פקק - 1","שוקו בננה פקק - 1","שוקו פונצ בננה פקק - 1","פרו קפה ללא סוכר 350 - 1",
  "פרו קפה 350 - 1","פרו וניל 350 - 1","פרו שוקולד אגוזים 350- 1","פרו צהוב 350 - 1","מלקי קייק מיניס - 1",
  "מלקי קייק - 1","כוסות קפה : קלאסי - 1","אקטימל תות - 3 י״ח","אקטימל תות בננה - 3 י״ח","אקטימל רגיל - 3 י״ח",
  "אקטימל גמדים - 3 י״ח","דנונה פרו קראנצ שוקולד - 12 י״ח","דנונה פרו וניל - 6 י״ח","דנונה פרו מנגו אפרסק - 6 י״ח",
  "דנונה פרו פיסטוק - 6 י״ח","דנונה פרו תות - 6 י״ח","דנונה פרו פירות יער - 6 י״ח","דנונה פרו שכבות פירות יער - 6 י״ח",
  "דנונה פרו שכבות מנגו - 6 י״ח","דנונה בננה טופי - 6 י״ח","רביולי גבינה - 3 י״ח","רביולי בטטה - 3 י״ח",
  "חומוס 750 חלק - 1","חומוס גלילי 600 - 1","חומוס עם טחינה400 - 1","חומוס עם חריף 400 - 1","חומוס חלק 400 - 1",
  "חומוס זעתר - 1","חומוס צנובר - 1","חציל פיקנטי 400 - 1","חציל במיונז 400 - 1","מטבוחה 400 - 1",
  "כרוב סגול 400 - 1","טחינה 400 - 1","חומוס 125 - 12 י״ח","טחינה 125 - 12 י״ח","מטבוחה 125 - 12 י״ח",
  "כרוב סגול 125 - 12 י״ח","חומוס עם חריף 150 - 1","אבוקדו גוואקמולי - 1","קוביות סלק 400 - 1","מטבוחה חריפה 400 - 1",
  "שמרים קוביה - 1","לורפק קופסא כחול -1","לורפק קופסא אדום - 1"
];

const INITIAL_PRODUCTS = RAW_PRODUCTS.map((raw, index) => {
  let [name, avgPart] = raw.split('-');
  name = name.trim().replace('*', '');
  let average = 0, unit = 'carton';
  if (avgPart) {
    avgPart = avgPart.trim();
    if (avgPart.includes('י״ח') || avgPart.includes('י"ח')) unit = 'unit';
    average = parseInt(avgPart.replace(/[^\d]/g, ''), 10) || 0;
  }
  return { id: `prod_${index}`, name, average, defaultUnit: unit, orderIndex: index };
});

// ===== מצב =====
let products = [], contacts = [], history = [], notes = [];
let orderState = {};
let currentView = 'order';
let mainMode = 'order';
let returnsList = [];
let returns = [];
let pendingBarcodeProductId = null, pendingBarcodeEdit = false;
let isOnline = navigator.onLine;
let seeded = false, draftReady = false, isDragging = false;
let sendCtx = null;
const avgTimers = {};
let advanceTimer = null;
let dragState = null;
const RETURNS_DRAFT_KEY = 'yt_returns_draft';

const $ = (id) => document.getElementById(id);
const app = $('app');

function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// ===== טיוטת הזמנה =====
function saveDraft() {
  if (!draftReady) { draftReady = true; return; }
  try { localStorage.setItem(ORDER_DRAFT_KEY, JSON.stringify(orderState)); } catch (e) {}
}
function restoreDraft() {
  try { const s = localStorage.getItem(ORDER_DRAFT_KEY); if (s) { const o = JSON.parse(s); if (o && typeof o === 'object') orderState = { ...orderState, ...o }; } } catch (e) {}
}
function saveReturnsDraft() { try { localStorage.setItem(RETURNS_DRAFT_KEY, JSON.stringify(returnsList)); } catch (e) {} }
function restoreReturnsDraft() { try { const s = localStorage.getItem(RETURNS_DRAFT_KEY); if (s) { const a = JSON.parse(s); if (Array.isArray(a)) returnsList = a; } } catch (e) {} }

// ===== התחברות =====
restoreDraft();
restoreReturnsDraft();
app.innerHTML = '<div class="text-center text-slate-500 font-bold py-20 animate-pulse">טוען נתונים...</div>';
if (auth) {
  signInAnonymously(auth).catch(err => { console.error("Auth:", err); fallbackLocal(); });
  onAuthStateChanged(auth, (u) => { if (u) { startListeners(); pruneOnLoad(); } });
} else { fallbackLocal(); }

function fallbackLocal() {
  products = INITIAL_PRODUCTS.slice(); contacts = INITIAL_CONTACTS.slice();
  products.forEach(p => { if (!orderState[p.id]) orderState[p.id] = { amount: '', unit: p.defaultUnit }; });
  renderView();
}

// ===== מאזיני Firestore =====
function startListeners() {
  if (!db) return;
  const pRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
  onSnapshot(pRef, (snap) => {
    if (snap.empty && !seeded) {
      seeded = true;
      const batch = writeBatch(db);
      INITIAL_PRODUCTS.forEach(pr => batch.set(doc(pRef, pr.id), pr));
      const cRef = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
      INITIAL_CONTACTS.forEach(c => batch.set(doc(cRef, c.id), c));
      batch.commit().catch(console.error);
      return;
    }
    const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    arr.sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
    products = arr;
    let changed = false;
    products.forEach(p => { if (!orderState[p.id]) { orderState[p.id] = { amount: '', unit: p.defaultUnit }; changed = true; } });
    if (changed) saveDraft();
    rerender();
  }, console.error);

  const cRef = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
  onSnapshot(cRef, (snap) => {
    if (snap.empty) return;
    const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    arr.sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
    contacts = arr;
    if (currentView === 'contacts') rerender();
    renderContactPicker();
  }, console.error);

  const hRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
  const hQ = query(hRef, orderBy('timestamp', 'desc'), limit(20));
  onSnapshot(hQ, (snap) => {
    history = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === 'history') rerender();
  }, console.error);

  const nRef = collection(db, 'artifacts', appId, 'public', 'data', 'notes');
  const nQ = query(nRef, orderBy('timestamp', 'desc'));
  onSnapshot(nQ, (snap) => {
    notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateNotesBadge();
    if (currentView === 'notes') rerender();
  }, console.error);

  const retRef = collection(db, 'artifacts', appId, 'public', 'data', 'returns');
  const retQ = query(retRef, orderBy('timestamp', 'desc'), limit(20));
  onSnapshot(retQ, (snap) => {
    returns = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === 'returnsHistory') rerender();
  }, console.error);
}

// ===== גרירה (Pointer Events) =====
function setupDrag() {
  const list = $('prodList'); if (!list) return;
  list.querySelectorAll('.drag-handle').forEach(h => h.addEventListener('pointerdown', onDragStart));
}
function onDragStart(e) {
  const item = e.currentTarget.closest('.prod-item'); if (!item) return;
  e.preventDefault();
  isDragging = true;
  dragState = { item, container: item.parentElement, startY: e.clientY };
  item.style.position = 'relative'; item.style.zIndex = '50';
  item.classList.add('shadow-xl', 'opacity-90', 'ring-2', 'ring-blue-300');
  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}
function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const { item, container } = dragState;
  const dy = e.clientY - dragState.startY;
  item.style.transform = 'translateY(' + dy + 'px)';
  const itemRect = item.getBoundingClientRect();
  const mid = itemRect.top + itemRect.height / 2;
  const others = [...container.querySelectorAll('.prod-item')];
  for (const other of others) {
    if (other === item) continue;
    const r = other.getBoundingClientRect();
    if (mid > r.top && mid < r.bottom) {
      const oMid = r.top + r.height / 2;
      if (mid < oMid) container.insertBefore(item, other);
      else container.insertBefore(item, other.nextSibling);
      dragState.startY = e.clientY;
      item.style.transform = 'translateY(0px)';
      break;
    }
  }
}
async function onDragEnd() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);
  if (!dragState) { isDragging = false; return; }
  const { item, container } = dragState;
  item.style.transform = ''; item.style.zIndex = ''; item.style.position = '';
  item.classList.remove('shadow-xl', 'opacity-90', 'ring-2', 'ring-blue-300');
  const ids = [...container.querySelectorAll('.prod-item')].map(el => el.dataset.id);
  dragState = null;
  buzz(15);
  await persistOrder(ids);
  isDragging = false;
}
async function persistOrder(ids) {
  const map = {}; products.forEach(p => map[p.id] = p);
  products = ids.map((id, i) => { const p = map[id]; if (p) p.orderIndex = i; return p; }).filter(Boolean);
  if (!db) return;
  const batch = writeBatch(db);
  ids.forEach((id, i) => batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { orderIndex: i }));
  await batch.commit().catch(console.error);
}

function renderReturns() {
  app.innerHTML =
    '<div class="relative mb-2">' +
      '<i class="fa-solid fa-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>' +

function refreshReturnsList() {
  const el = $('returnsListEl'); if (el) el.innerHTML = returnsList.length ? returnsList.map(buildReturnRow).join('') : emptyReturnsHtml();
  const cnt = $('returnsCount'); if (cnt) cnt.textContent = returnsList.length + ' פריטים';
}
function renderReturnsResults(q) {
  const box = $('returnsResults'); if (!box) return;
  q = (q || '').trim();
  if (!q) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  const matches = products.filter(p => (p.name || '').includes(q) || (p.barcode || '').includes(q)).slice(0, 8);
  box.innerHTML = matches.length ? matches.map(p =>
    '<button data-role="ret-add" data-id="' + p.id + '" class="w-full text-right p-3 border-b border-slate-100 last:border-0 flex items-center justify-between gap-2">' +
      '<span class="font-bold text-slate-800 text-sm truncate">' + p.name + '</span>' +
      (p.barcode ? '<span class="text-[11px] text-slate-400 shrink-0"><i class="fa-solid fa-barcode"></i> ' + p.barcode + '</span>' : '<span class="text-[11px] text-amber-500 font-bold shrink-0">+ ברקוד</span>') +
    '</button>'
  ).join('') : '<div class="p-3 text-sm text-slate-400 text-center">לא נמצא מוצר</div>';
  box.classList.remove('hidden');
}
function addReturn(productId) {
  const p = products.find(x => x.id === productId); if (!p) return;
  if (!p.barcode) { openBarcodePrompt(productId, false); return; }
  const existing = returnsList.find(it => it.productId === productId);
  if (existing) existing.qty += 1;
  else returnsList.push({ productId, name: p.name, barcode: p.barcode, qty: 1 });
  saveReturnsDraft();
  const s = $('returnsSearch'); if (s) s.value = '';
  const box = $('returnsResults'); if (box) { box.classList.add('hidden'); box.innerHTML = ''; }
  refreshReturnsList();
  updateCart();
}
function changeReturnQty(id, d) {
  const it = returnsList.find(x => x.productId === id); if (!it) return;
  it.qty = Math.max(1, (it.qty || 1) + d);
  const span = $('retqty-' + id); if (span) span.textContent = it.qty;
  saveReturnsDraft();
}
function removeReturn(id) {
  returnsList = returnsList.filter(x => x.productId !== id);
  saveReturnsDraft();
  refreshReturnsList();
  updateCart();
}
function openBarcodePrompt(productId, isEdit) {
  const p = products.find(x => x.id === productId); if (!p) return;
  pendingBarcodeProductId = productId; pendingBarcodeEdit = !!isEdit;
  $('promptTitle').textContent = isEdit ? 'עריכת ברקוד' : 'הוספת ברקוד';
  $('promptSub').textContent = p.name;
  $('promptInput').value = p.barcode || '';
  const m = $('promptModal'); m.classList.remove('hidden'); m.classList.add('flex');
  setTimeout(() => { const i = $('promptInput'); if (i) { i.focus(); i.select(); } }, 60);
}
function hidePrompt() { const m = $('promptModal'); m.classList.add('hidden'); m.classList.remove('flex'); pendingBarcodeProductId = null; }
async function savePrompt() {
  const id = pendingBarcodeProductId;
  const wasEdit = pendingBarcodeEdit;
  if (!id) { hidePrompt(); return; }
  const val = ($('promptInput').value || '').trim();
  if (!val) { hidePrompt(); return; }
  const p = products.find(x => x.id === id); if (p) p.barcode = val;
  if (db) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { barcode: val }).catch(console.error);
  const entry = returnsList.find(it => it.productId === id); if (entry) { entry.barcode = val; saveReturnsDraft(); }
  hidePrompt();
  if (!wasEdit) addReturn(id);
  else refreshReturnsList();
}
function openReturnsSend() {
  if (!returnsList.length) return;
  const items = returnsList.map(it => ({ name: it.name, barcode: it.barcode, qty: it.qty }));
  sendCtx = { type: 'returns', items, resetCurrent: false };
  renderSendModal(items, 'רשימת חזרות', 'returns');
}
function buildReturnsMessage(items, note) {
  const d = new Date();
  const dateStr = d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const line = '━━━━━━━━━━━━━━';
  let m = '↩️ *חזרות / זיכוי — יטבתה*\n📅 ' + dateStr + '\n' + line + '\n\n';
  items.forEach(i => { m += '🔹 ' + i.name + '\n   📦 ברקוד: ' + (i.barcode || '—') + ' · כמות: *' + i.qty + '*\n'; });
  m += '\n' + line + '\n📦 סה״כ: *' + items.length + '* פריטים';
  if (note && note.trim()) m += '\n\n📝 ' + note.trim();
  return m;
}

      const credited = !!r.credited;

      const statusBar = credited

        : '<div class="bg-amber-400 text-amber-900 px-4 py-2.5 flex items-center gap-2 font-black"><i class="fa-solid fa-hourglass-half"></i> ממתין לזיכוי</div>';
      return '<div class="bg-white rounded-2xl shadow-sm border ' + (credited ? 'border-green-300' : 'border-amber-300') + ' overflow-hidden mb-4">' +
        statusBar +
        '<div class="p-4 border-b border-slate-100 flex justify-between items-center">' +
          '<div><div class="font-black text-slate-800">' + d.toLocaleDateString('he-IL') + ' · ' + d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }) + '</div>' +
          '<div class="text-sm text-slate-500">נשלח אל: <b>' + (r.sentTo || '') + '</b></div></div>' +
          '<div class="bg-blue-100 text-blue-800 font-black px-3 py-1 rounded-full text-xs">' + ((r.items || []).length) + ' פריטים</div>' +

          (credited

            : '<button data-role="credit" data-id="' + r.id + '" class="btn-tap w-full bg-green-600 text-white font-black py-3 rounded-xl flex items-center justify-center gap-2 text-base"><i class="fa-solid fa-check"></i> סמן שהזיכוי בוצע</button>') +
        '</div>' +

async function markCredited(id, val) {
  const r = returns.find(x => x.id === id);
  if (r) { r.credited = val; r.creditedAt = val ? Date.now() : null; }
  if (currentView === 'returnsHistory') renderReturnsHistory();
  buzz(val ? 18 : 8);
  if (db) {
    try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'returns', id), { credited: val, creditedAt: val ? Date.now() : null }); }
    catch (e) { console.error(e); }
  }
}
async function pruneCollection(name, keep) {
  if (!db) return;
  try {
    const snap = await getDocs(query(collection(db, 'artifacts', appId, 'public', 'data', name), orderBy('timestamp', 'desc')));
    const docs = snap.docs;
    if (docs.length <= keep) return;
    for (let i = keep; i < docs.length; i += 400) {
      const batch = writeBatch(db);
      docs.slice(i, i + 400).forEach(dd => batch.delete(dd.ref));
      await batch.commit();
    }
  } catch (e) { console.error(e); }
}
let prunedOnce = false;
function pruneOnLoad() {
  if (prunedOnce) return; prunedOnce = true;
  pruneCollection('history', 20);
  pruneCollection('returns', 20);
}
async function clearAllDocs(name) {
  if (!db) return;
  try {
    const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', name));
    const docs = snap.docs;
    for (let i = 0; i < docs.length; i += 400) {
      const batch = writeBatch(db);
      docs.slice(i, i + 400).forEach(dd => batch.delete(dd.ref));
      await batch.commit();
    }
  } catch (e) { console.error(e); }
}

// ===== פעולות מוצרים/אנשי קשר =====
function saveAvg(id, val) {
  const n = parseInt(String(val).replace(/[^0-9]/g, ''), 10);
  const avg = isNaN(n) ? 0 : n;
  const p = products.find(x => x.id === id); if (p) p.average = avg;
  if (!db) return;
  clearTimeout(avgTimers[id]);
  avgTimers[id] = setTimeout(() => { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { average: avg }).catch(console.error); }, 700);
}
async function addProduct() {
  const nameEl = $('npName'); if (!nameEl) return;
  const name = nameEl.value.trim(); if (!name || !db) return;
  const avg = parseInt(($('npAvg').value || '').replace(/[^0-9]/g, ''), 10) || 0;
  const unit = $('npUnit').value;
  const maxIdx = products.length ? Math.max(...products.map(p => p.orderIndex || 0)) : -1;
  nameEl.value = ''; $('npAvg').value = '';
  await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { name, average: avg, defaultUnit: unit, orderIndex: maxIdx + 1 }).catch(console.error);
}
async function delProduct(id) { if (db) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id)).catch(console.error); }
async function addContact() {
  const nEl = $('ncName'), pEl = $('ncPhone'); if (!nEl || !pEl) return;
  const name = nEl.value.trim(), phone = pEl.value.trim(); if (!name || !phone || !db) return;
  nEl.value = ''; pEl.value = '';
  await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'contacts'), { name, phone, orderIndex: contacts.length }).catch(console.error);
}
async function delContact(id) { if (db) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'contacts', id)).catch(console.error); }

// ===== החלפת יחידה =====
function toggleUnit(id, btn) {
  const st = orderState[id] || (orderState[id] = { amount: '', unit: 'carton' });
  st.unit = (st.unit === 'unit') ? 'carton' : 'unit';
  const isCarton = st.unit !== 'unit';
  btn.classList.toggle('bg-amber-100', isCarton);
  btn.classList.toggle('text-amber-800', isCarton);
  btn.classList.toggle('bg-emerald-100', !isCarton);
  btn.classList.toggle('text-emerald-800', !isCarton);
  btn.innerHTML = '<i class="fa-solid ' + (isCarton ? 'fa-box' : 'fa-hashtag') + ' text-xs"></i><span class="text-[11px]">' + (isCarton ? 'ארגז' : "יח'") + '</span>';
  saveDraft();
}

// ===== שליחה =====
function orderedItems() {
  return products.filter(p => !p.hidden && parseInt(orderState[p.id] && orderState[p.id].amount, 10) > 0).map(p => ({
    name: p.name, amount: parseInt(orderState[p.id].amount, 10),
    unit: (orderState[p.id].unit === 'unit') ? 'יחידות' : 'ארגזים'
  }));
}
function buildMessage(items, note) {
  const d = new Date();
  const dateStr = d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const line = '━━━━━━━━━━━━━━';
  let m = '🥛 *הזמנת יטבתה*\n📅 ' + dateStr + '\n' + line + '\n\n';
  items.forEach(i => { m += '🔹 ' + i.name + ' — *' + i.amount + '* ' + i.unit + '\n'; });
  m += '\n' + line + '\n📦 סה״כ: *' + items.length + '* מוצרים';
  if (note && note.trim()) m += '\n\n📝 ' + note.trim();
  return m;
}
function renderContactPicker() {
  const c = $('contactList'); if (!c) return;
  if (!contacts.length) { c.innerHTML = '<div class="text-center p-4 text-slate-500">לא הוגדרו אנשי קשר. הוסף בהגדרות.</div>'; return; }
  c.innerHTML = contacts.map(ct =>
    '<button data-role="send-to" data-id="' + ct.id + '" class="btn-tap w-full p-4 rounded-2xl border-2 border-slate-100 hover:border-green-500 flex items-center justify-between">' +
      '<div class="flex items-center gap-3"><div class="bg-green-100 text-green-600 p-2 rounded-full"><i class="fa-brands fa-whatsapp text-xl"></i></div>' +
      '<div class="text-right"><div class="font-black text-slate-800 text-lg">' + ct.name + '</div><div class="text-sm text-slate-500" dir="ltr">' + ct.phone + '</div></div></div>' +
      '<i class="fa-solid fa-chevron-left text-slate-300"></i>' +
    '</button>'
  ).join('');
}
function renderSendModal(items, titleNote, type) {
  const list = items.map(i => {
    if (type === 'returns') {
      return '<div class="flex justify-between items-center text-sm py-1.5 border-b border-slate-100 last:border-0"><div class="min-w-0 pl-2"><span class="font-bold text-slate-700">' + i.name + '</span><span class="block text-[11px] text-slate-400"><i class="fa-solid fa-barcode"></i> ' + (i.barcode || '—') + '</span></div><span class="font-black text-blue-700 whitespace-nowrap">' + i.qty + ' יח׳</span></div>';
    }
    return '<div class="flex justify-between items-center text-sm py-1.5 border-b border-slate-100 last:border-0"><span class="font-bold text-slate-700">' + i.name + '</span><span class="font-black text-blue-700 whitespace-nowrap">' + i.amount + ' ' + i.unit + '</span></div>';
  }).join('');
  $('sendSummary').innerHTML =
    '<div class="mb-2 font-black text-slate-800">' + (titleNote || 'סיכום הזמנה') + ' · ' + items.length + ' פריטים</div>' +
    '<div class="bg-slate-50 rounded-xl p-3 max-h-40 overflow-y-auto border border-slate-100 mb-3">' + list + '</div>' +
    '<div class="mb-3"><input id="orderNote" type="text" placeholder="הערה (לא חובה)..." class="w-full p-2.5 rounded-xl border border-slate-200 outline-none text-sm bg-white"></div>' +
    '<div class="text-xs text-slate-400 mb-1 font-bold">בחר/י איש קשר לשליחה:</div>';
  renderContactPicker();
  const m = $('sendModal'); m.classList.remove('hidden'); m.classList.add('flex');
}
function openSendCurrent() {
  const items = orderedItems();
  if (!items.length) return;
  sendCtx = { type: 'order', items, resetCurrent: true };
  renderSendModal(items, 'סיכום הזמנה', 'order');
}
function openResend(order) {
  const items = (order.items || []).map(i => ({ name: i.name, amount: i.amount, unit: i.unit }));
  if (!items.length) return;
  sendCtx = { type: 'order', items, resetCurrent: false };
  renderSendModal(items, 'שליחה חוזרת', 'order');
}
function hideSend() { const m = $('sendModal'); m.classList.add('hidden'); m.classList.remove('flex'); }
async function performSend(contact) {
  if (!sendCtx || !sendCtx.items.length) return;
  const { type, items, resetCurrent } = sendCtx;
  const note = ($('orderNote') ? $('orderNote').value.trim() : '');
  let phone = (contact.phone || '').replace(/[-+\s]/g, '');
  if (phone.startsWith('0')) phone = '972' + phone.substring(1);
  if (type === 'returns') {
    if (db) {
      const sp = addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'returns'), { timestamp: Date.now(), sentTo: contact.name, items, credited: false }).catch(console.error);
      await Promise.race([sp, new Promise(r => setTimeout(r, 1500))]);
    }
    const msg = buildReturnsMessage(items, note);
    const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
    returnsList = []; saveReturnsDraft();
    sendCtx = null; hideSend(); setView('returnsHistory'); window.location.href = url;
    return;
  }
  if (db) {
    const sp = addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { timestamp: Date.now(), sentTo: contact.name, items }).catch(console.error);
    await Promise.race([sp, new Promise(r => setTimeout(r, 1500))]);
  }
  const msg = buildMessage(items, note);
  const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  if (resetCurrent) {
    orderState = {};
    products.forEach(p => orderState[p.id] = { amount: '', unit: p.defaultUnit });
    try { localStorage.removeItem(ORDER_DRAFT_KEY); } catch (e) {}
  }
  sendCtx = null;
  hideSend();
  setView('history');
  window.location.href = url;
}

$('searchInput').addEventListener('input', (e) => { $('clearSearch').classList.toggle('hidden', !e.target.value); applySearch(e.target.value); });
$('clearSearch').addEventListener('click', () => { $('searchInput').value = ''; $('clearSearch').classList.add('hidden'); applySearch(''); });
$('contactList').addEventListener('click', (e) => { const b = e.target.closest('[data-role="send-to"]'); if (!b) return; const ct = contacts.find(x => x.id === b.dataset.id); if (ct) performSend(ct); });

app.addEventListener('input', (e) => {
  const t = e.target; const role = t.getAttribute && t.getAttribute('data-role');
  if (t.id === 'returnsSearch') { renderReturnsResults(t.value); return; }
  if (role === 'amount') {
    const id = t.dataset.id; let v = t.value.replace(/[^0-9]/g, ''); if (v !== t.value) t.value = v;
    (orderState[id] = orderState[id] || { amount: '', unit: 'carton' }).amount = (v === '0' ? '' : v);
    refreshRowSelected(id); updateCart(); saveDraft();
    clearTimeout(advanceTimer);
    if (v.length >= 2) { advanceFrom(id); }
    else if (v.length === 1) { advanceTimer = setTimeout(() => { const cur = app.querySelector('input[data-role="amount"][data-id="' + id + '"]'); if (document.activeElement === cur) advanceFrom(id); }, 850); }
  } else if (role === 'avg' || role === 'avg-set') {
    const id = t.dataset.id; let v = t.value.replace(/[^0-9]/g, ''); if (v !== t.value) t.value = v;
    saveAvg(id, v);
  }
});

app.addEventListener('keydown', (e) => {
  const t = e.target;
  if (t.id === 'newNote' && e.key === 'Enter') { e.preventDefault(); addNote(); return; }
  if (!(t.getAttribute && t.getAttribute('data-role') === 'amount')) return;
  if (e.key === 'Enter') { e.preventDefault(); clearTimeout(advanceTimer); advanceFrom(t.dataset.id); }
});

app.addEventListener('click', (e) => {
  const recBtn = e.target.closest('[data-role="rec"]');
  if (recBtn && !recBtn.disabled) {
    const id = recBtn.dataset.id; const p = products.find(x => x.id === id); const rec = parseInt(p && p.average, 10) || 0;
    if (rec > 0) { setAmount(id, rec); buzz(12); advanceScroll(id); }
    return;
  }
  const unitBtn = e.target.closest('[data-role="unit"]');
  if (unitBtn) { toggleUnit(unitBtn.dataset.id, unitBtn); buzz(8); return; }
  const t = e.target.closest('[data-role]'); if (!t) return;
  const role = t.dataset.role, id = t.dataset.id;
  if (role === 'clear-order') showConfirm('ניקוי הזמנה', 'לנקות את כל הכמויות שהוזנו?', 'נקה', clearOrder);
  else if (role === 'go-contacts') setView('contacts');
  else if (role === 'go-settings') setView('settings');
  else if (role === 'add-product') addProduct();
  else if (role === 'del-product') { const p = products.find(x => x.id === id); showConfirm('מחיקת מוצר', 'למחוק את "' + (p ? p.name : '') + '"?', 'מחק', () => delProduct(id)); }
  else if (role === 'toggle-hidden') toggleHidden(id);
  else if (role === 'add-contact') addContact();
  else if (role === 'del-contact') { const c = contacts.find(x => x.id === id); showConfirm('מחיקת איש קשר', 'למחוק את "' + (c ? c.name : '') + '"?', 'מחק', () => delContact(id)); }
  else if (role === 'resend') { const o = history.find(x => x.id === id); if (o) openResend(o); }
  else if (role === 'add-note') addNote();
  else if (role === 'done-note') doneNote(id);
  else if (role === 'ret-add') addReturn(id);
  else if (role === 'ret-plus') changeReturnQty(id, 1);
  else if (role === 'ret-minus') changeReturnQty(id, -1);
  else if (role === 'ret-remove') removeReturn(id);
  else if (role === 'edit-barcode') openBarcodePrompt(id, true);
  else if (role === 'credit') markCredited(id, true);
  else if (role === 'uncredit') markCredited(id, false);
  else if (role === 'clear-history') showConfirm('ניקוי היסטוריה', 'למחוק את כל היסטוריית ההזמנות? פעולה זו אינה הפיכה.', 'מחק הכל', () => clearAllDocs('history'));
  else if (role === 'clear-returns-history') showConfirm('ניקוי היסטוריה', 'למחוק את כל היסטוריית החזרות? פעולה זו אינה הפיכה.', 'מחק הכל', () => clearAllDocs('returns'));
});

// ===== מצב כהה =====
function applyDarkIcon() { const on = document.documentElement.classList.contains('dark'); $('darkIcon').className = on ? 'fa-solid fa-sun' : 'fa-solid fa-moon'; }
applyDarkIcon();
$('btnDark').addEventListener('click', () => { const on = document.documentElement.classList.toggle('dark'); try { localStorage.setItem('yt_dark', on ? '1' : '0'); } catch (e) {} applyDarkIcon(); });

// ===== סטטוס רשת =====
function setOnlineUI() {
  isOnline = navigator.onLine;
  $('onlineDot').className = 'inline-flex rounded-full h-2.5 w-2.5 ' + (isOnline ? 'bg-green-400 shadow-[0_0_6px_rgba(74,222,128,.8)]' : 'bg-red-400');
  $('onlineText').textContent = isOnline ? 'מחובר' : 'לא מחובר';
}
window.addEventListener('online', setOnlineUI);
window.addEventListener('offline', setOnlineUI);
setOnlineUI();

// ===== Service Worker =====
if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); }); }
</script>
</body>
</html>
