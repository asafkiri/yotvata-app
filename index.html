    <script type="module">
// ===== Firebase (מפתח הענן של גלוברנס) =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import {

const firebaseConfig = {
  apiKey: "AIzaSyAqn42tE-akkqrKBH8v2jjOFgRRoiKyW2s",
  authDomain: "globrands-db.firebaseapp.com",
  projectId: "globrands-db",
  storageBucket: "globrands-db.firebasestorage.app",
  messagingSenderId: "1027802658989",
  appId: "1:1027802658989:web:6a74fd0926b1199e776e24",
  measurementId: "G-7X8HTPPW0J"
};
const appId = 'yotvata-app-classic'; // מרחב נפרד ב-Firestore (לא מתערבב עם גלוברנס)
const ORDER_DRAFT_KEY = 'yt_order_draft';

let fbApp, auth, db;
try {
  fbApp = initializeApp(firebaseConfig);
  auth = getAuth(fbApp);
  try {
    db = initializeFirestore(fbApp, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });
  } catch (e) { db = getFirestore(fbApp); }
} catch (e) { console.error("Firebase init error:", e); }

// ===== נתוני בסיס =====
const INITIAL_CONTACTS = [
  { id: '1', name: 'אסף', phone: '058-7788526', orderIndex: 0 },
  { id: '2', name: 'שחר', phone: '053-5260311', orderIndex: 1 },
  { id: '3', name: 'שלום', phone: '054-4851718', orderIndex: 2 },
  { id: '4', name: 'מוריס', phone: '054-2391926', orderIndex: 3 },
];

const RAW_PRODUCTS = [
  "חלב 2 ליטר - 3","חלב מעושר - 1","חלב טבעי - 1","חלב אדום - 1","חלב כתום - 1",
  "שוקו ליטר - 1","שוקו ליטר מוקה - 6 י״ח","שוקו ליטר אייס קפה - 6 י״ח","שוקו ליטר בננה - 6 י״ח",
  "טופו - 1","מעדן דנונה תות - 1","מעדן דנונה פירות יער - 1","שוקו שקית - 3","מוקה שקית - 1",
  "מלקי שוקולד - 2","מלקי טופ עדשים - 10 י״ח","מלקי טופ מגולגלת - 10 י״ח","מלקי טריו פיסטוק - 12 י״ח",
  "מלקי טריו - 12 י״ח","מלקי תות - 12 י״ח","מלקי וניל - 12 י״ח","מלקי פסק זמן - 12 י״ח",
  "מלקי קצפת קפוצינו - 12 י״ח","מלקי קפוצינו - 12 י״ח","דניאלה וניל - 1","דניאל תות - 2",
  "דניאלה תות בננה - 1","גבינה - 1","קוטג״ - 1","גבינה 500 - 6 י״ח","שמנת - 1",
  "מעדן הגולן שוקולד - 12 י״ח","מעדן הגולן וניל - 12 י״ח","מעדן הגולן מוקה - 12 י״ח",
  "דני וניל - 1","דני שוקולד - 1","דני שלוק - 1","גמדים ירוק - 6 י״ח","גמדים צהוב - 6 י״ח",
  "גמדים סקוואיז צהוב - 1","גמדים סקוואיז אדום - 1","סמפונייה שמנת - 3 י״ח","סימפוניה שום שמיר - 3 י״ח",
  "סמפוניה זתים - 3 י״ח","סמפוניה שיבקע - 3 י״ח","דנונה ביו 0% - 12 י״ח","דנונה ביו 1.7% - 12 י״ח",
  "דנונה ביו 3% - 12 י״ח","דנונה ביו מולטי - 12 י״ח","דנונה מולטי תפוח - 12 י״ח","דנונה מתיקות מעודנת - 12 י״ח",
  "דנונה אקטיביה שזיף שיבולת שועל - 12 י״ח","יוגורט יווני - 12 י״ח","סקי תות - 12 י״ח","סקי וניל - 12 י״ח",
  "דנונה קראנצ פצפוצים - 12 י״ח","דנונה קראנצ פקאן - 12 י״ח","דנונה קראנצ תות - 12 י״ח","משקה דנונה תות בננה- 1",
  "אייס קפה - 350 מ״ל -1","שוקו פקק - 1","שוקו בננה פקק - 1","שוקו פונצ בננה פקק - 1","פרו קפה ללא סוכר 350 - 1",
  "פרו קפה 350 - 1","פרו וניל 350 - 1","פרו שוקולד אגוזים 350- 1","פרו צהוב 350 - 1","מלקי קייק מיניס - 1",
  "מלקי קייק - 1","כוסות קפה : קלאסי - 1","אקטימל תות - 3 י״ח","אקטימל תות בננה - 3 י״ח","אקטימל רגיל - 3 י״ח",
  "אקטימל גמדים - 3 י״ח","דנונה פרו קראנצ שוקולד - 12 י״ח","דנונה פרו וניל - 6 י״ח","דנונה פרו מנגו אפרסק - 6 י״ח",
  "דנונה פרו פיסטוק - 6 י״ח","דנונה פרו תות - 6 י״ח","דנונה פרו פירות יער - 6 י״ח","דנונה פרו שכבות פירות יער - 6 י״ח",
  "דנונה פרו שכבות מנגו - 6 י״ח","דנונה בננה טופי - 6 י״ח","רביולי גבינה - 3 י״ח","רביולי בטטה - 3 י״ח",
  "חומוס 750 חלק - 1","חומוס גלילי 600 - 1","חומוס עם טחינה400 - 1","חומוס עם חריף 400 - 1","חומוס חלק 400 - 1",
  "חומוס זעתר - 1","חומוס צנובר - 1","חציל פיקנטי 400 - 1","חציל במיונז 400 - 1","מטבוחה 400 - 1",
  "כרוב סגול 400 - 1","טחינה 400 - 1","חומוס 125 - 12 י״ח","טחינה 125 - 12 י״ח","מטבוחה 125 - 12 י״ח",
  "כרוב סגול 125 - 12 י״ח","חומוס עם חריף 150 - 1","אבוקדו גוואקמולי - 1","קוביות סלק 400 - 1","מטבוחה חריפה 400 - 1",
  "שמרים קוביה - 1","לורפק קופסא כחול -1","לורפק קופסא אדום - 1"
];

const INITIAL_PRODUCTS = RAW_PRODUCTS.map((raw, index) => {
  let [name, avgPart] = raw.split('-');
  name = name.trim().replace('*', '');
  let average = 0, unit = 'carton';
  if (avgPart) {
    avgPart = avgPart.trim();
    if (avgPart.includes('י״ח') || avgPart.includes('י"ח')) unit = 'unit';
    average = parseInt(avgPart.replace(/[^\d]/g, ''), 10) || 0;
  }
  return { id: `prod_${index}`, name, average, defaultUnit: unit, orderIndex: index };
});

// ===== מצב =====
let products = [], contacts = [], history = [];
let orderState = {};
let currentView = 'order';
let isOnline = navigator.onLine;
let seeded = false, productSig = '', draftReady = false;
const avgTimers = {};

// ===== עזרי DOM =====
const $ = (id) => document.getElementById(id);
const app = $('app');

// ===== טיוטת הזמנה (שמירה מקומית) =====
function saveDraft() {
  if (!draftReady) { draftReady = true; return; }
  try { localStorage.setItem(ORDER_DRAFT_KEY, JSON.stringify(orderState)); } catch (e) {}
}
function restoreDraft() {
  try {
    const s = localStorage.getItem(ORDER_DRAFT_KEY);
    if (s) { const o = JSON.parse(s); if (o && typeof o === 'object') orderState = { ...orderState, ...o }; }
  } catch (e) {}
}

// ===== התחברות אנונימית =====
restoreDraft();
app.innerHTML = '<div class="text-center text-slate-500 font-bold py-20 animate-pulse">טוען נתונים...</div>';
if (auth) {
  signInAnonymously(auth).catch(err => { console.error("Auth:", err); fallbackLocal(); });
  onAuthStateChanged(auth, (u) => { if (u) startListeners(); });
} else { fallbackLocal(); }

function fallbackLocal() {
  products = INITIAL_PRODUCTS.slice(); contacts = INITIAL_CONTACTS.slice();
  products.forEach(p => { if (!orderState[p.id]) orderState[p.id] = { amount:'', unit:p.defaultUnit }; });
  renderView();
}

// ===== מאזיני Firestore =====
function startListeners() {
  if (!db) return;
  const pRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
  onSnapshot(pRef, (snap) => {
    if (snap.empty && !seeded) {
      seeded = true;
      const batch = writeBatch(db);
      INITIAL_PRODUCTS.forEach(pr => batch.set(doc(pRef, pr.id), pr));
      const cRef = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
      INITIAL_CONTACTS.forEach(c => batch.set(doc(cRef, c.id), c));
      batch.commit().catch(console.error);
      return;
    }
    const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    arr.sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
    products = arr;
    let changed = false;
    products.forEach(p => { if (!orderState[p.id]) { orderState[p.id] = { amount:'', unit: p.defaultUnit }; changed = true; } });
    if (changed) saveDraft();
    maybeRender();
  }, console.error);

  const cRef = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
  onSnapshot(cRef, (snap) => {
    if (snap.empty) return;
    const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    arr.sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
    contacts = arr;
    if (currentView === 'contacts') renderView();
    renderContactPicker();
  }, console.error);

  const hRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
  const hQ = query(hRef, orderBy('timestamp', 'desc'), limit(50));
  onSnapshot(hQ, (snap) => {
    history = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === 'history') renderView();
  }, console.error);
}

function maybeRender() {
  const sig = products.map(p => p.id + ':' + p.name + ':' + (p.orderIndex || 0) + ':' + p.defaultUnit).join('|');
  const structChanged = sig !== productSig;
  productSig = sig;
  if (currentView !== 'order') { renderView(); return; }
  const a = document.activeElement;
  const typing = a && a.getAttribute && (a.getAttribute('data-role') === 'amount' || a.getAttribute('data-role') === 'avg');
  if (typing) return; // לא לשבש הקלדה
  renderOrder();
}

// ===== ניווט בין מסכים =====
function setView(v) { currentView = v; renderView(); window.scrollTo({ top: 0 }); }

function renderView() {
  $('searchWrap').style.display = (currentView === 'order') ? '' : 'none';
  $('backBar').classList.toggle('hidden', currentView === 'order');
  if (currentView === 'order') renderOrder();
  else if (currentView === 'settings') renderSettings();
  else if (currentView === 'contacts') renderContacts();
  else if (currentView === 'history') renderHistory();
  updateCart();
}

// ===== מסך הזמנה =====
function renderOrder() {
  if (!products.length) {
    app.innerHTML = '<div class="text-center p-10 text-slate-500">אין מוצרים כרגע. עבור להגדרות כדי להוסיף.</div>';
    updateCart(); return;
  }
  const rows = products.map(buildOrderRow).join('');
  app.innerHTML =
    '<div class="grid grid-cols-12 gap-2 px-2 text-xs font-black text-slate-500 mb-2">' +
      '<div class="col-span-5">מוצר</div>' +
      '<div class="col-span-2 text-center">ממוצע</div>' +
      '<div class="col-span-2 text-center">הזמנה</div>' +
      '<div class="col-span-3 text-center">יח\'/ארגז</div>' +
    '</div>' +
    '<div id="orderList" class="space-y-2.5 pb-6">' + rows + '</div>' +
    '<div id="noResults" class="hidden text-center text-slate-400 py-10"><i class="fa-solid fa-magnifying-glass text-3xl mb-2"></i><div class="font-bold">לא נמצא מוצר</div></div>';
  applySearch(searchQueryVal());
  updateCart();
}

function buildOrderRow(p) {
  const st = orderState[p.id] || { amount: '', unit: p.defaultUnit };
  const sel = parseInt(st.amount, 10) > 0;
  const isCarton = st.unit !== 'unit';
  const safeName = (p.name || '').replace(/"/g, '&quot;');
  return (
    '<div id="row-' + p.id + '" data-id="' + p.id + '" data-name="' + safeName + '" class="row-card grid grid-cols-12 gap-2 items-center p-3 rounded-2xl border shadow-sm ' +
      (sel ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-100') + '">' +
      '<div class="col-span-5 font-bold text-slate-800 text-sm leading-tight">' + p.name + '</div>' +
      '<div class="col-span-2 flex justify-center">' +
        '<input data-role="avg" data-id="' + p.id + '" type="text" inputmode="numeric" tabindex="-1" value="' + (p.average || '') + '" placeholder="0" class="w-10 h-10 bg-slate-100 text-slate-600 font-bold rounded-lg text-center text-sm outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white">' +
      '</div>' +
      '<div class="col-span-2 flex justify-center">' +
        '<input data-role="amount" data-id="' + p.id + '" type="text" inputmode="numeric" enterkeyhint="next" value="' + st.amount + '" placeholder="0" class="w-14 h-12 text-center text-lg font-black border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none bg-white">' +
      '</div>' +
      '<div class="col-span-3 flex justify-center">' +
        '<button data-role="unit" data-id="' + p.id + '" class="btn-tap w-full max-w-[84px] h-10 rounded-lg font-black text-sm flex items-center justify-center gap-1 ' +
          (isCarton ? 'bg-amber-100 text-amber-800' : 'bg-emerald-100 text-emerald-800') + '">' +
          '<i class="fa-solid ' + (isCarton ? 'fa-box' : 'fa-hashtag') + ' text-xs"></i><span>' + (isCarton ? 'ארגז' : "יח'") + '</span>' +
        '</button>' +
      '</div>' +
    '</div>'
  );
}

function refreshRowSelected(id) {
  const st = orderState[id]; const row = $('row-' + id);
  if (!row || !st) return;
  const sel = parseInt(st.amount, 10) > 0;
  row.classList.toggle('bg-blue-50', sel);
  row.classList.toggle('border-blue-200', sel);
  row.classList.toggle('bg-white', !sel);
  row.classList.toggle('border-slate-100', !sel);
}

function updateCart() {
  const n = products.reduce((a, p) => a + (parseInt(orderState[p.id] && orderState[p.id].amount, 10) > 0 ? 1 : 0), 0);
  $('cartCount').textContent = n;
  const show = currentView === 'order' && n > 0;
  $('cartBtn').classList.toggle('hidden', !show);
  $('cartBtn').classList.toggle('flex', show);
}

function searchQueryVal() { const el = $('searchInput'); return el ? el.value : ''; }
function applySearch(q) {
  q = (q || '').trim();
  const list = $('orderList'); if (!list) return;
  let any = false;
  list.querySelectorAll('[data-id]').forEach(row => {
    const match = !q || (row.dataset.name || '').includes(q);
    row.classList.toggle('hidden', !match);
    if (match) any = true;
  });
  const nr = $('noResults'); if (nr) nr.classList.toggle('hidden', any || !q);
}

// ===== מסך הגדרות =====
function renderSettings() {
  const rows = products.map((p, i) =>
    '<div class="flex items-center justify-between p-3 bg-white border border-slate-100 rounded-xl">' +
      '<div class="flex-1 font-bold text-sm text-slate-800 leading-tight">' + p.name + '</div>' +
      '<input data-role="avg-set" data-id="' + p.id + '" type="text" inputmode="numeric" value="' + (p.average || '') + '" placeholder="0" class="w-14 mx-2 bg-slate-100 rounded-lg p-1.5 text-center font-bold text-sm outline-none">' +
      '<div class="flex items-center gap-1">' +
        '<div class="flex flex-col gap-1">' +
          '<button data-role="move-up" data-id="' + p.id + '" class="btn-tap bg-slate-100 rounded p-1.5 ' + (i === 0 ? 'opacity-30' : '') + '"><i class="fa-solid fa-chevron-up text-xs"></i></button>' +
          '<button data-role="move-down" data-id="' + p.id + '" class="btn-tap bg-slate-100 rounded p-1.5 ' + (i === products.length - 1 ? 'opacity-30' : '') + '"><i class="fa-solid fa-chevron-down text-xs"></i></button>' +
        '</div>' +
        '<button data-role="del-product" data-id="' + p.id + '" class="btn-tap p-2 text-red-500"><i class="fa-solid fa-trash-can"></i></button>' +
      '</div>' +
    '</div>'
  ).join('');
  app.innerHTML =
    '<button data-role="go-contacts" class="btn-tap w-full bg-white border border-slate-200 p-4 rounded-2xl flex items-center justify-center gap-3 mb-5 shadow-sm">' +
      '<div class="bg-green-100 p-3 rounded-full text-green-600"><i class="fa-brands fa-whatsapp text-2xl"></i></div>' +
      '<span class="font-black text-slate-700 text-lg">אנשי קשר (וואטסאפ)</span>' +
    '</button>' +
    '<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">' +
      '<div class="bg-slate-100 p-4 border-b border-slate-200"><h2 class="font-black text-lg text-slate-800">עריכת מוצרים</h2></div>' +
      '<div class="p-4 bg-blue-50 border-b border-slate-200 flex flex-wrap gap-2 items-end">' +
        '<div class="flex-1 min-w-[150px]"><label class="block text-xs font-bold text-slate-500 mb-1">שם</label><input id="npName" type="text" class="w-full p-2 rounded-lg border border-slate-200 outline-none bg-white"></div>' +
        '<div class="w-16"><label class="block text-xs font-bold text-slate-500 mb-1">ממוצע</label><input id="npAvg" type="text" inputmode="numeric" class="w-full p-2 rounded-lg border border-slate-200 outline-none text-center bg-white"></div>' +
        '<div class="w-20"><label class="block text-xs font-bold text-slate-500 mb-1">ברירת מחדל</label><select id="npUnit" class="w-full p-2 rounded-lg border border-slate-200 outline-none bg-white"><option value="carton">ארגז</option><option value="unit">יחידה</option></select></div>' +
        '<button data-role="add-product" class="btn-tap bg-blue-600 text-white p-2.5 rounded-lg font-bold self-end mb-[1px]"><i class="fa-solid fa-plus"></i></button>' +
      '</div>' +
      '<div class="p-2 space-y-2">' + rows + '</div>' +
    '</div>';
}

// ===== מסך אנשי קשר =====
function renderContacts() {
  const rows = contacts.map(c =>
    '<div class="flex items-center justify-between p-3 border border-slate-100 rounded-xl">' +
      '<div><div class="font-bold text-slate-800">' + c.name + '</div><div class="text-sm text-slate-500" dir="ltr">' + c.phone + '</div></div>' +
      '<button data-role="del-contact" data-id="' + c.id + '" class="btn-tap p-2 text-red-500"><i class="fa-solid fa-trash-can"></i></button>' +
    '</div>'
  ).join('');
  app.innerHTML =
    '<button data-role="go-settings" class="btn-tap flex items-center gap-2 text-blue-600 font-black bg-white p-2 px-4 rounded-lg shadow-sm mb-5"><i class="fa-solid fa-chevron-right"></i> חזרה להגדרות</button>' +
    '<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">' +
      '<div class="bg-green-50 p-4 border-b border-slate-200 text-green-800"><h2 class="font-black text-lg flex items-center gap-2"><i class="fa-brands fa-whatsapp"></i> אנשי קשר לשליחה</h2></div>' +
      '<div class="p-4 bg-slate-50 border-b border-slate-200 flex gap-3 items-end">' +
        '<div class="flex-1"><label class="block text-xs font-bold text-slate-500 mb-1">שם</label><input id="ncName" type="text" class="w-full p-2 rounded-lg border border-slate-200 outline-none bg-white"></div>' +
        '<div class="flex-1"><label class="block text-xs font-bold text-slate-500 mb-1">טלפון</label><input id="ncPhone" type="tel" class="w-full p-2 rounded-lg border border-slate-200 outline-none bg-white" dir="ltr"></div>' +
        '<button data-role="add-contact" class="btn-tap bg-green-600 text-white p-2.5 rounded-lg self-end mb-[1px]"><i class="fa-solid fa-plus"></i></button>' +
      '</div>' +
      '<div class="p-4 space-y-2">' + rows + '</div>' +
    '</div>';
}

// ===== מסך היסטוריה =====
function renderHistory() {
  if (!history.length) {
    app.innerHTML = '<div class="text-center py-16 text-slate-400"><i class="fa-solid fa-clock-rotate-left text-5xl mb-4"></i><h3 class="font-black text-xl text-slate-600">אין היסטוריה</h3></div>';
    return;
  }
  app.innerHTML = '<h2 class="font-black text-2xl px-1 py-2 text-slate-800">היסטוריית הזמנות</h2>' +
    history.map(o => {
      const d = new Date(o.timestamp);
      const items = (o.items || []).map(it => '<li class="flex justify-between items-center text-sm border-b border-slate-100 pb-2 last:border-0"><span class="font-medium text-slate-700">' + it.name + '</span><span class="font-black bg-slate-100 px-2 rounded">' + it.amount + ' ' + it.unit + '</span></li>').join('');
      return '<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4">' +
        '<div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">' +
          '<div><div class="font-black text-slate-800">' + d.toLocaleDateString('he-IL') + ' · ' + d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }) + '</div>' +
          '<div class="text-sm text-slate-500 flex items-center gap-1"><i class="fa-solid fa-check text-green-500"></i> נשלח אל: <b>' + (o.sentTo || '') + '</b></div></div>' +
          '<div class="bg-blue-100 text-blue-800 font-black px-3 py-1 rounded-full text-sm">' + ((o.items || []).length) + ' פריטים</div>' +
        '</div>' +
        '<div class="p-4"><ul class="space-y-2">' + items + '</ul></div>' +
      '</div>';
    }).join('');
}

// ===== רינדור מחדש בטוח (לא משבש הקלדה) =====
function rerender() {
  const a = document.activeElement;
  if (a && app.contains(a) && (a.tagName === 'INPUT' || a.tagName === 'SELECT')) return;
  renderView();
}

// ===== פעולות מוצרים =====
function saveAvg(id, val) {
  const n = parseInt(String(val).replace(/[^0-9]/g, ''), 10);
  const avg = isNaN(n) ? 0 : n;
  const p = products.find(x => x.id === id); if (p) p.average = avg;
  if (!db) return;
  clearTimeout(avgTimers[id]);
  avgTimers[id] = setTimeout(() => {
    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { average: avg }).catch(console.error);
  }, 700);
}

async function addProduct() {
  const nameEl = $('npName'); if (!nameEl) return;
  const name = nameEl.value.trim(); if (!name || !db) return;
  const avg = parseInt(($('npAvg').value || '').replace(/[^0-9]/g, ''), 10) || 0;
  const unit = $('npUnit').value;
  const maxIdx = products.length ? Math.max(...products.map(p => p.orderIndex || 0)) : -1;
  nameEl.value = ''; $('npAvg').value = '';
  await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { name, average: avg, defaultUnit: unit, orderIndex: maxIdx + 1 }).catch(console.error);
}

async function delProduct(id) {
  if (!db) return;
  await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id)).catch(console.error);
}

async function moveProduct(id, dir) {
  const i = products.findIndex(p => p.id === id); if (i < 0) return;
  const j = i + dir; if (j < 0 || j >= products.length || !db) return;
  const a = products[i], b = products[j];
  const ai = a.orderIndex || 0, bj = b.orderIndex || 0;
  const batch = writeBatch(db);
  batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'products', a.id), { orderIndex: bj });
  batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'products', b.id), { orderIndex: ai });
  await batch.commit().catch(console.error);
}

// ===== פעולות אנשי קשר =====
async function addContact() {
  const nEl = $('ncName'), pEl = $('ncPhone'); if (!nEl || !pEl) return;
  const name = nEl.value.trim(), phone = pEl.value.trim();
  if (!name || !phone || !db) return;
  nEl.value = ''; pEl.value = '';
  await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'contacts'), { name, phone, orderIndex: contacts.length }).catch(console.error);
}
async function delContact(id) {
  if (!db) return;
  await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'contacts', id)).catch(console.error);
}

// ===== החלפת יחידה במקום =====
function toggleUnit(id, btn) {
  const st = orderState[id] || (orderState[id] = { amount: '', unit: 'carton' });
  st.unit = (st.unit === 'unit') ? 'carton' : 'unit';
  const isCarton = st.unit !== 'unit';
  btn.classList.toggle('bg-amber-100', isCarton);
  btn.classList.toggle('text-amber-800', isCarton);
  btn.classList.toggle('bg-emerald-100', !isCarton);
  btn.classList.toggle('text-emerald-800', !isCarton);
  btn.innerHTML = '<i class="fa-solid ' + (isCarton ? 'fa-box' : 'fa-hashtag') + ' text-xs"></i><span>' + (isCarton ? 'ארגז' : "יח'") + '</span>';
  saveDraft();
}

// ===== שליחה לוואטסאפ =====
function renderContactPicker() {
  const c = $('contactList'); if (!c) return;
  if (!contacts.length) { c.innerHTML = '<div class="text-center p-4 text-slate-500">לא הוגדרו אנשי קשר. הוסף בהגדרות.</div>'; return; }
  c.innerHTML = contacts.map(ct =>
    '<button data-role="send-to" data-id="' + ct.id + '" class="btn-tap w-full p-4 rounded-2xl border-2 border-slate-100 hover:border-green-500 flex items-center justify-between">' +
      '<div class="flex items-center gap-3"><div class="bg-green-100 text-green-600 p-2 rounded-full"><i class="fa-brands fa-whatsapp text-xl"></i></div>' +
      '<div class="text-right"><div class="font-black text-slate-800 text-lg">' + ct.name + '</div><div class="text-sm text-slate-500" dir="ltr">' + ct.phone + '</div></div></div>' +
      '<i class="fa-solid fa-chevron-left text-slate-300"></i>' +
    '</button>'
  ).join('');
}

function openSend() {
  const n = products.reduce((a, p) => a + (parseInt(orderState[p.id] && orderState[p.id].amount, 10) > 0 ? 1 : 0), 0);
  if (!n) return;
  $('sendSummary').textContent = 'בהזמנה: ' + n + ' מוצרים';
  renderContactPicker();
  const m = $('sendModal'); m.classList.remove('hidden'); m.classList.add('flex');
}
function hideSend() { const m = $('sendModal'); m.classList.add('hidden'); m.classList.remove('flex'); }

async function sendOrder(contact) {
  const items = products.filter(p => parseInt(orderState[p.id] && orderState[p.id].amount, 10) > 0).map(p => ({
    name: p.name,
    amount: parseInt(orderState[p.id].amount, 10),
    unit: (orderState[p.id].unit === 'unit') ? 'יחידות' : 'ארגזים'
  }));
  if (!items.length) return;

  if (db) {
    const sp = addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { timestamp: Date.now(), sentTo: contact.name, items }).catch(console.error);
    await Promise.race([sp, new Promise(r => setTimeout(r, 1500))]);
  }

  const dateStr = new Date().toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  let msg = '*הזמנת יטבתה - ' + dateStr + '*\n\n';
  items.forEach(i => { msg += '▪️ ' + i.name + ': *' + i.amount + '* ' + i.unit + '\n'; });
  let phone = (contact.phone || '').replace(/[-+\s]/g, '');
  if (phone.startsWith('0')) phone = '972' + phone.substring(1);
  const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);

  orderState = {};
  products.forEach(p => orderState[p.id] = { amount: '', unit: p.defaultUnit });
  try { localStorage.removeItem(ORDER_DRAFT_KEY); } catch (e) {}
  hideSend();
  setView('history');
  window.location.href = url;
}

// ===== חלון אישור =====
let confirmCb = null;
function showConfirm(title, msg, okText, cb) {
  $('confirmTitle').textContent = title; $('confirmMsg').textContent = msg; $('confirmOk').textContent = okText || 'מחק';
  confirmCb = cb;
  const m = $('confirmModal'); m.classList.remove('hidden'); m.classList.add('flex');
}
function hideConfirm() { const m = $('confirmModal'); m.classList.add('hidden'); m.classList.remove('flex'); confirmCb = null; }

// ===== חיווט אירועים =====
$('confirmCancel').addEventListener('click', hideConfirm);
$('confirmOk').addEventListener('click', () => { const cb = confirmCb; hideConfirm(); if (cb) cb(); });

$('brandHome').addEventListener('click', () => setView('order'));
$('btnHistory').addEventListener('click', () => setView('history'));
$('btnSettings').addEventListener('click', () => setView('settings'));
$('backToOrder').addEventListener('click', () => setView('order'));
$('cartBtn').addEventListener('click', openSend);
$('closeSend').addEventListener('click', hideSend);

$('searchInput').addEventListener('input', (e) => { $('clearSearch').classList.toggle('hidden', !e.target.value); applySearch(e.target.value); });
$('clearSearch').addEventListener('click', () => { $('searchInput').value = ''; $('clearSearch').classList.add('hidden'); applySearch(''); });

$('contactList').addEventListener('click', (e) => {
  const b = e.target.closest('[data-role="send-to"]'); if (!b) return;
  const ct = contacts.find(x => x.id === b.dataset.id); if (ct) sendOrder(ct);
});

// דלגציה על אזור התוכן
app.addEventListener('input', (e) => {
  const t = e.target; const role = t.getAttribute && t.getAttribute('data-role');
  if (role === 'amount') {
    const id = t.dataset.id; let v = t.value.replace(/[^0-9]/g, ''); if (v !== t.value) t.value = v;
    (orderState[id] = orderState[id] || { amount: '', unit: 'carton' }).amount = v;
    refreshRowSelected(id); updateCart(); saveDraft();
  } else if (role === 'avg' || role === 'avg-set') {
    const id = t.dataset.id; let v = t.value.replace(/[^0-9]/g, ''); if (v !== t.value) t.value = v;
    saveAvg(id, v);
  }
});

app.addEventListener('keydown', (e) => {
  const t = e.target;
  if (!(t.getAttribute && t.getAttribute('data-role') === 'amount')) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    const inputs = [...app.querySelectorAll('input[data-role="amount"]')].filter(x => { const r = x.closest('[data-id]'); return r && !r.classList.contains('hidden'); });
    const idx = inputs.indexOf(t);
    if (idx >= 0 && inputs[idx + 1]) { inputs[idx + 1].focus(); inputs[idx + 1].select(); }
    else t.blur();
  }
});

app.addEventListener('click', (e) => {
  const unitBtn = e.target.closest('[data-role="unit"]');
  if (unitBtn) { toggleUnit(unitBtn.dataset.id, unitBtn); return; }
  const t = e.target.closest('[data-role]'); if (!t) return;
  const role = t.dataset.role, id = t.dataset.id;
  if (role === 'go-contacts') setView('contacts');
  else if (role === 'go-settings') setView('settings');
  else if (role === 'add-product') addProduct();
  else if (role === 'del-product') { const p = products.find(x => x.id === id); showConfirm('מחיקת מוצר', 'למחוק את "' + (p ? p.name : '') + '"?', 'מחק', () => delProduct(id)); }
  else if (role === 'move-up') moveProduct(id, -1);
  else if (role === 'move-down') moveProduct(id, 1);
  else if (role === 'add-contact') addContact();
  else if (role === 'del-contact') { const c = contacts.find(x => x.id === id); showConfirm('מחיקת איש קשר', 'למחוק את "' + (c ? c.name : '') + '"?', 'מחק', () => delContact(id)); }
});

// ===== מצב כהה =====
function applyDarkIcon() { const on = document.documentElement.classList.contains('dark'); $('darkIcon').className = on ? 'fa-solid fa-sun' : 'fa-solid fa-moon'; }
applyDarkIcon();
$('btnDark').addEventListener('click', () => {
  const on = document.documentElement.classList.toggle('dark');
  try { localStorage.setItem('yt_dark', on ? '1' : '0'); } catch (e) {}
  applyDarkIcon();
});

// ===== סטטוס רשת =====
function setOnlineUI() {
  isOnline = navigator.onLine;
  $('onlineDot').className = 'inline-flex rounded-full h-2.5 w-2.5 ' + (isOnline ? 'bg-green-400 shadow-[0_0_6px_rgba(74,222,128,.8)]' : 'bg-red-400');
  $('onlineText').textContent = isOnline ? 'מחובר' : 'לא מחובר';
}
window.addEventListener('online', setOnlineUI);
window.addEventListener('offline', setOnlineUI);
setOnlineUI();

// ===== Service Worker =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
</script>
