<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>הזמנות יטבתה</title>

    <!-- PWA: התקנה כאפליקציה במסך מלא (אנדרואיד + אייפון) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="יטבתה">
    <meta name="theme-color" content="#1d4ed8">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

    <!-- מצב כהה מוקדם (לפני הצביעה כדי למנוע הבהוב) -->
    <script>
      try { if (localStorage.getItem('yt_dark') === '1') document.documentElement.classList.add('dark'); } catch (e) {}
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { font-family: 'Heebo', sans-serif; }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      input[type="number"] { -moz-appearance: textfield; }
      .btn-tap { transition: transform .08s ease; }
      .btn-tap:active { transform: scale(.93); }
      .row-card { transition: background-color .15s ease, border-color .15s ease; }
      details > summary { list-style: none; cursor: pointer; }
      details > summary::-webkit-details-marker { display: none; }
      .hist-chevron { transition: transform .2s ease; }
      details[open] .hist-chevron { transform: rotate(180deg); }

      /* ===== מצב כהה ===== */
      html.dark body, html.dark .bg-slate-50 { background-color:#0f172a !important; }
      html.dark .bg-white { background-color:#1e293b !important; }
      html.dark .bg-slate-100 { background-color:#334155 !important; }
      html.dark .bg-blue-50 { background-color:#1e3a5f !important; }
      html.dark .text-slate-800 { color:#f1f5f9 !important; }
      html.dark .text-slate-700 { color:#e2e8f0 !important; }
      html.dark .text-slate-600 { color:#cbd5e1 !important; }
      html.dark .text-slate-500 { color:#94a3b8 !important; }
      html.dark .text-slate-400 { color:#64748b !important; }
      html.dark .border-slate-100 { border-color:#334155 !important; }
      html.dark .border-slate-200 { border-color:#334155 !important; }
      html.dark .border { border-color:#334155 !important; }
      html.dark .shadow-sm, html.dark .shadow-md, html.dark .shadow-lg, html.dark .shadow-xl { box-shadow:0 4px 16px rgba(0,0,0,.4) !important; }
      html.dark input, html.dark select { background-color:#0f172a !important; color:#e2e8f0 !important; border-color:#475569 !important; }
      html.dark .ph-light::placeholder { color:#64748b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-28">

    <!-- כותרת -->
    <header class="sticky top-0 z-30 bg-gradient-to-l from-blue-700 to-blue-500 text-white shadow-lg">
      <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2.5 cursor-pointer min-w-0" id="brandHome">
          <div class="w-10 h-10 rounded-xl bg-white/15 border border-white/25 flex items-center justify-center font-black text-2xl shrink-0">י</div>
          <div class="flex flex-col min-w-0">
            <h1 class="text-lg font-black leading-none truncate">הזמנות יטבתה</h1>
            <div class="flex items-center gap-1.5 mt-1">
              <span id="onlineDot" class="inline-flex rounded-full h-2.5 w-2.5 bg-green-400 shadow-[0_0_6px_rgba(74,222,128,.8)]"></span>
              <span id="onlineText" class="text-[10px] text-blue-50/90 font-medium">מחובר</span>
            </div>
          </div>
        </div>
        <div class="flex gap-1 shrink-0">
          <button id="btnDark" class="btn-tap w-9 h-9 rounded-xl bg-white/10 hover:bg-white/20 flex items-center justify-center border border-white/15" title="מצב כהה"><i id="darkIcon" class="fa-solid fa-moon"></i></button>
          <button id="btnNotes" class="btn-tap relative w-9 h-9 rounded-xl bg-white/10 hover:bg-white/20 flex items-center justify-center border border-white/15" title="הערות ותזכורות"><i class="fa-solid fa-note-sticky"></i><span id="notesBadge" class="hidden absolute -top-1.5 -left-1.5 min-w-[18px] h-[18px] px-1 bg-red-500 text-white text-[10px] font-black rounded-full flex items-center justify-center border-2 border-blue-600">0</span></button>
          <button id="btnHistory" class="btn-tap w-9 h-9 rounded-xl bg-white/10 hover:bg-white/20 flex items-center justify-center border border-white/15" title="היסטוריה"><i class="fa-solid fa-clock-rotate-left"></i></button>
          <button id="btnSettings" class="btn-tap w-9 h-9 rounded-xl bg-white/10 hover:bg-white/20 flex items-center justify-center border border-white/15" title="הגדרות"><i class="fa-solid fa-gear"></i></button>
        </div>
      </div>

      <!-- לשוניות מצב -->
      <div id="modeTabs" class="max-w-3xl mx-auto px-4 pb-2">
        <div class="flex bg-white/10 rounded-xl p-1 border border-white/15">
          <button id="segOrder" class="flex-1 py-2 rounded-lg text-sm font-black flex items-center justify-center gap-1.5"><i class="fa-solid fa-cart-shopping text-xs"></i> הזמנה</button>
          <button id="segReturns" class="flex-1 py-2 rounded-lg text-sm font-black flex items-center justify-center gap-1.5"><i class="fa-solid fa-rotate-left text-xs"></i> חזרות</button>
          <button id="segReceiving" class="flex-1 py-2 rounded-lg text-sm font-black flex items-center justify-center gap-1.5"><i class="fa-solid fa-truck-ramp-box text-xs"></i> קליטה</button>
        </div>
      </div>

      <!-- חיפוש -->
      <div id="searchWrap" class="max-w-3xl mx-auto px-4 pb-3">
        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-blue-200 text-sm"></i>
          <input id="searchInput" type="text" inputmode="search" placeholder="חיפוש מוצר..." class="ph-light w-full bg-white/15 focus:bg-white text-white focus:text-slate-800 placeholder-blue-100 rounded-xl py-2.5 pr-9 pl-9 text-sm font-bold outline-none border border-white/20 focus:border-white transition-colors">
          <button id="clearSearch" class="hidden absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 w-7 h-7 flex items-center justify-center"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
      </div>
    </header>

    <!-- תוכן ראשי -->
    <main id="app" class="max-w-3xl mx-auto p-4"></main>

    <!-- כפתור סיום הזמנה (צף) -->
    <div id="cartWrap" class="fixed bottom-6 inset-x-0 flex justify-center pointer-events-none px-4 z-20">
      <button id="cartBtn" class="btn-tap pointer-events-auto hidden items-center gap-3 px-8 py-4 rounded-full shadow-2xl bg-blue-600 text-white">
        <i class="fa-solid fa-paper-plane text-lg"></i>
        <span class="font-black text-lg"><span id="cartLabel">סיום הזמנה</span> (<span id="cartCount">0</span>)</span>
      </button>
    </div>

    <!-- סרגל חזרה (במסכים שאינם הזמנה) -->
    <div id="backBar" class="hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 p-3 flex justify-center z-20">
      <button id="backToOrder" class="btn-tap bg-blue-100 text-blue-700 px-6 py-3 rounded-xl font-black flex items-center gap-2 w-full max-w-sm justify-center">
        <i class="fa-solid fa-chevron-right"></i> חזרה להזמנה
      </button>
    </div>

    <!-- חלון שליחה -->
    <div id="sendModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-50">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
          <h3 class="font-black text-xl">למי לשלוח בוואטסאפ?</h3>
          <button id="closeSend" class="btn-tap w-9 h-9 rounded-lg hover:bg-blue-700 flex items-center justify-center"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="sendSummary" class="px-4 pt-3 text-sm text-slate-500 font-bold"></div>
        <div id="contactList" class="p-4 space-y-3 max-h-[60vh] overflow-y-auto"></div>
      </div>
    </div>

    <!-- חלון אישור -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-50">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="p-6 text-center">
          <div id="confirmIcon" class="mx-auto mb-3 w-14 h-14 rounded-full bg-red-50 flex items-center justify-center"><i class="fa-solid fa-triangle-exclamation text-red-500 text-2xl"></i></div>
          <h3 id="confirmTitle" class="font-black text-lg text-slate-800 mb-1">אישור</h3>
          <p id="confirmMsg" class="text-slate-500 text-sm"></p>
        </div>
        <div class="flex gap-2 p-4 pt-0">
          <button id="confirmCancel" class="btn-tap flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-600">ביטול</button>
          <button id="confirmOk" class="btn-tap flex-1 py-3 rounded-xl font-black bg-red-600 text-white">מחק</button>
        </div>
      </div>
    </div>

    <div id="promptModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-50">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="p-5">
          <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-barcode text-blue-600 text-xl"></i><h3 id="promptTitle" class="font-black text-lg text-slate-800">הוספת ברקוד</h3></div>
          <p id="promptSub" class="text-slate-500 text-sm mb-3"></p>
          <input id="promptInput" type="text" inputmode="numeric" autocomplete="off" class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none text-center font-bold tracking-widest focus:border-blue-500" placeholder="הקלד או סרוק ברקוד">
          <button id="promptScan" class="btn-tap mt-3 w-full py-2.5 rounded-xl font-black bg-blue-50 text-blue-700 flex items-center justify-center gap-2"><i class="fa-solid fa-camera"></i> סרוק עם מצלמה</button>
        </div>
        <div class="flex gap-2 p-4 pt-0">
          <button id="promptCancel" class="btn-tap flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-600">ביטול</button>
          <button id="promptOk" class="btn-tap flex-1 py-3 rounded-xl font-black bg-blue-600 text-white">שמור</button>
        </div>
      </div>
    </div>

    <!-- מסך סריקת מצלמה -->
    <div id="scanModal" class="hidden fixed inset-0 bg-black z-[55] flex-col">
      <div class="relative flex-1 overflow-hidden">
        <video id="scanVideo" class="w-full h-full object-cover" playsinline muted></video>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="w-72 h-44 border-4 border-white/90 rounded-2xl" style="box-shadow:0 0 0 9999px rgba(0,0,0,0.45)"></div>
        </div>
        <div class="absolute top-0 inset-x-0 p-4 flex items-center justify-between">
          <span class="text-white font-black text-lg" style="text-shadow:0 1px 3px rgba(0,0,0,.6)">סריקת ברקוד</span>
          <button id="scanClose" class="btn-tap w-11 h-11 rounded-full bg-black/50 text-white flex items-center justify-center"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div id="scanOverlay" class="hidden absolute top-16 inset-x-0 px-4 flex flex-col items-center gap-1 pointer-events-none">
          <div class="bg-blue-600/90 text-white rounded-full px-4 py-1.5 font-black text-sm shadow-lg">פריטים: <span id="scanOverlayCount">0</span></div>
          <div id="scanOverlayName" class="text-white text-xs font-bold" style="text-shadow:0 1px 3px rgba(0,0,0,.7)"></div>
        </div>
        <div class="absolute bottom-0 inset-x-0 p-8 text-center">
          <p id="scanHint" class="text-white font-bold" style="text-shadow:0 1px 3px rgba(0,0,0,.6)">כוון את הברקוד אל תוך המסגרת</p>
        </div>
      </div>
    </div>

    <!-- הודעת ביטול (Undo) -->
    <div id="toast" class="hidden fixed bottom-24 inset-x-0 justify-center px-4 z-[60] pointer-events-none">
      <div class="pointer-events-auto bg-slate-900 text-white rounded-2xl shadow-2xl px-4 py-3 flex items-center gap-3 max-w-sm w-full">
        <span id="toastMsg" class="flex-1 text-sm font-bold"></span>
        <button id="toastBtn" class="hidden btn-tap text-blue-300 font-black text-sm px-3 py-1 rounded-lg">בטל</button>
      </div>
    </div>

    <!-- חלון מוצר חדש / מחיר -->
    <div id="newProductModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-[70]">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="p-5">
          <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-plus text-blue-600 text-xl"></i><h3 class="font-black text-lg text-slate-800">מוצר חדש</h3></div>
          <p class="text-slate-500 text-sm mb-3">ברקוד: <span id="npr_code" class="font-bold text-slate-700"></span></p>
          <label class="text-[11px] text-slate-400 font-bold block mb-1">שם המוצר</label>
          <input id="npr_name" type="text" autocomplete="off" class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none font-bold focus:border-blue-500 mb-3 disabled:bg-slate-100 disabled:text-slate-500" placeholder="שם המוצר">
          <label class="text-[11px] text-slate-400 font-bold block mb-1">מחיר ליחידה (ללא מע"מ)</label>
          <div class="flex items-center gap-2"><span class="text-slate-400 font-bold text-lg">₪</span><input id="npr_price" type="text" inputmode="decimal" class="flex-1 p-3 rounded-xl border-2 border-slate-200 outline-none text-center font-black focus:border-blue-500" placeholder="0.00"></div>
        </div>
        <div class="flex gap-2 p-4 pt-0">
          <button id="npr_cancel" class="btn-tap flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-600">ביטול</button>
          <button id="npr_ok" class="btn-tap flex-1 py-3 rounded-xl font-black bg-blue-600 text-white">שמור והוסף</button>
        </div>
      </div>
    </div>

    <!-- חלון מבצע -->
    <div id="promoModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-[70]">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="p-5">
          <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-percent text-rose-600 text-xl"></i><h3 class="font-black text-lg text-slate-800">מבצע למוצר</h3></div>
          <p id="promoName" class="text-slate-500 text-sm mb-3"></p>
          <label class="text-[11px] text-slate-400 font-bold block mb-1">אחוז הנחה</label>
          <div class="flex items-center gap-2 mb-3"><input id="promoPct" type="text" inputmode="decimal" class="flex-1 p-3 rounded-xl border-2 border-slate-200 outline-none text-center font-black focus:border-rose-500" placeholder="10"><span class="text-slate-400 font-black text-lg">%</span></div>
          <div class="flex gap-2">
            <div class="flex-1"><label class="text-[11px] text-slate-400 font-bold block mb-1">מתאריך</label><input id="promoStart" type="date" class="w-full p-2.5 rounded-xl border-2 border-slate-200 outline-none text-sm font-bold focus:border-rose-500"></div>
            <div class="flex-1"><label class="text-[11px] text-slate-400 font-bold block mb-1">עד תאריך</label><input id="promoEnd" type="date" class="w-full p-2.5 rounded-xl border-2 border-slate-200 outline-none text-sm font-bold focus:border-rose-500"></div>
          </div>
          <label class="text-[11px] text-slate-400 font-bold block mb-1 mt-3">כמות מינ׳ למבצע (ארגזים)</label>
          <input id="promoMin" type="text" inputmode="numeric" class="w-full p-2.5 rounded-xl border-2 border-slate-200 outline-none text-center font-black focus:border-rose-500" placeholder="1 = ללא תנאי כמות">
          <button id="promoRemove" class="btn-tap hidden mt-3 w-full py-2.5 rounded-xl font-black bg-rose-50 text-rose-600 flex items-center justify-center gap-2"><i class="fa-solid fa-ban"></i> בטל מבצע</button>
        </div>
        <div class="flex gap-2 p-4 pt-0">
          <button id="promo_cancel" class="btn-tap flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-600">ביטול</button>
          <button id="promo_ok" class="btn-tap flex-1 py-3 rounded-xl font-black bg-rose-600 text-white">שמור מבצע</button>
        </div>
      </div>
    </div>

    <!-- חלון סיכום תעודה -->
    <div id="receiptSummaryModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-[65]">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col max-h-[88vh]">
        <div class="p-5 pb-2"><div class="flex items-center gap-2"><i class="fa-solid fa-file-invoice text-blue-600 text-xl"></i><h3 class="font-black text-lg text-slate-800">סיכום תעודה</h3></div><p class="text-slate-500 text-sm mt-1">השווה לתעודת הספק ואשר</p></div>
        <div id="rsBody" class="px-5 overflow-y-auto"></div>
        <div class="flex gap-2 p-4">
          <button id="rs_cancel" class="btn-tap flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-600">חזרה</button>
          <button id="rs_ok" class="btn-tap flex-1 py-3 rounded-xl font-black bg-green-600 text-white flex items-center justify-center gap-2"><i class="fa-solid fa-check"></i> אשר וקלוט</button>
        </div>
      </div>
    </div>

    <!-- חלון כמות בסריקה -->
    <div id="qtyModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-[70]">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="p-5 text-center">
          <div class="flex items-center justify-center gap-2 mb-1"><i class="fa-solid fa-cubes text-blue-600 text-xl"></i><h3 class="font-black text-lg text-slate-800">כמות</h3></div>
          <p id="qtyName" class="text-slate-700 font-bold text-sm"></p>
          <p id="qtyExisting" class="hidden text-[11px] text-amber-600 font-bold mt-1"></p>
          <div class="flex items-center justify-center gap-3 mt-4">
            <button id="qty_minus" class="btn-tap w-14 h-14 rounded-2xl bg-slate-100 text-slate-700 flex items-center justify-center text-2xl"><i class="fa-solid fa-minus"></i></button>
            <input id="qtyVal" type="text" inputmode="numeric" value="1" class="w-24 h-16 text-center text-3xl font-black border-2 border-slate-200 rounded-2xl outline-none focus:border-blue-500">
            <button id="qty_plus" class="btn-tap w-14 h-14 rounded-2xl bg-slate-100 text-slate-700 flex items-center justify-center text-2xl"><i class="fa-solid fa-plus"></i></button>
          </div>
        </div>
        <div class="px-4 pb-2"><button id="qty_again" class="btn-tap w-full py-3.5 rounded-xl font-black bg-blue-600 text-white flex items-center justify-center gap-2 text-base"><i class="fa-solid fa-barcode"></i> אישור וסרוק הבא</button></div>
        <div class="flex gap-2 p-4 pt-2">
          <button id="qty_cancel" class="btn-tap flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-500">ביטול</button>
          <button id="qty_done" class="btn-tap flex-1 py-3 rounded-xl font-black bg-slate-800 text-white">סיום</button>
        </div>
      </div>
    </div>

    <!-- חלון עריכת מוצר (עדכון מחירים) -->
    <div id="prodModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-[70]">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="p-5">
          <div class="flex items-center gap-2 mb-3"><i class="fa-solid fa-tag text-blue-600 text-xl"></i><h3 id="prodTitle" class="font-black text-lg text-slate-800">עדכון מוצר</h3></div>
          <label class="text-[11px] text-slate-400 font-bold block mb-1">שם המוצר</label>
          <input id="prod_name" type="text" autocomplete="off" class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none font-bold focus:border-blue-500 mb-3" placeholder="שם המוצר">
          <label class="text-[11px] text-slate-400 font-bold block mb-1">ברקוד</label>
          <div class="flex items-center gap-2 mb-3">
            <input id="prod_barcode" type="text" inputmode="numeric" autocomplete="off" class="flex-1 p-3 rounded-xl border-2 border-slate-200 outline-none font-bold tracking-wide text-center focus:border-blue-500" placeholder="ללא ברקוד">
            <button id="pr_scanbc" class="btn-tap shrink-0 px-4 py-3 rounded-xl font-black bg-blue-50 text-blue-700 flex items-center gap-2"><i class="fa-solid fa-camera"></i></button>
          </div>
          <label class="text-[11px] text-slate-400 font-bold block mb-1">מחיר ליחידה (ללא מע"מ)</label>

// ===== מאזיני Firestore =====
function startListeners() {
  if (!db) return;
  const pRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
  onSnapshot(pRef, (snap) => {
    if (snap.empty && !seeded) {
      seeded = true;
      const batch = writeBatch(db);
      INITIAL_PRODUCTS.forEach(pr => batch.set(doc(pRef, pr.id), pr));
      const cRef = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
      INITIAL_CONTACTS.forEach(c => batch.set(doc(cRef, c.id), c));
      batch.commit().catch(console.error);
      return;
    }
    const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    arr.sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
    products = arr;
    let changed = false;
    products.forEach(p => { if (!orderState[p.id]) { orderState[p.id] = { amount: '', unit: p.defaultUnit }; changed = true; } });
    if (changed) saveDraft();
    rerender();
  }, console.error);

  const cRef = collection(db, 'artifacts', appId, 'public', 'data', 'contacts');
  onSnapshot(cRef, (snap) => {
    if (snap.empty) return;
    const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    arr.sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
    contacts = arr;
    if (currentView === 'contacts') rerender();
    renderContactPicker();
  }, console.error);

  const hRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
  const hQ = query(hRef, orderBy('timestamp', 'desc'), limit(20));
  onSnapshot(hQ, (snap) => {
    history = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === 'history') rerender();
  }, console.error);

  const nRef = collection(db, 'artifacts', appId, 'public', 'data', 'notes');
  const nQ = query(nRef, orderBy('timestamp', 'desc'));
  onSnapshot(nQ, (snap) => {
    notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateNotesBadge();
    if (currentView === 'notes') rerender();
  }, console.error);

  const retRef = collection(db, 'artifacts', appId, 'public', 'data', 'returns');
  const retQ = query(retRef, orderBy('timestamp', 'desc'), limit(200));
  onSnapshot(retQ, (snap) => {
    returns = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === 'returnsHistory') rerender();
  }, console.error);

  const rcRef = collection(db, 'artifacts', appId, 'public', 'data', 'receipts');

  onSnapshot(rcQ, (snap) => {
    receipts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === 'receiptsHistory') rerender();
  }, console.error);
}

}

      '</button>' +

      '<input data-role="amount" data-id="' + p.id + '" type="text" inputmode="numeric" enterkeyhint="next" value="' + st.amount + '" placeholder="0" class="shrink-0 w-12 h-12 text-center text-lg font-black border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none bg-white">' +
      '<button data-role="unit" data-id="' + p.id + '" class="btn-tap shrink-0 w-14 h-12 rounded-xl font-black flex flex-col items-center justify-center gap-0.5 ' +

  );
}

// ===== גרירה (Pointer Events) =====
function setupDrag() {
  const list = $('prodList'); if (!list) return;
  list.querySelectorAll('.drag-handle').forEach(h => h.addEventListener('pointerdown', onDragStart));
}
function onDragStart(e) {
  const item = e.currentTarget.closest('.prod-item'); if (!item) return;
  e.preventDefault();
  try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
  isDragging = true;
  dragState = { item, container: item.parentElement, startY: e.clientY, handle: e.currentTarget, pointerId: e.pointerId };
  item.style.position = 'relative'; item.style.zIndex = '50';
  item.classList.add('shadow-xl', 'opacity-90', 'ring-2', 'ring-blue-300');
  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}
function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const { item, container } = dragState;
  const dy = e.clientY - dragState.startY;
  item.style.transform = 'translateY(' + dy + 'px)';
  const itemRect = item.getBoundingClientRect();
  const mid = itemRect.top + itemRect.height / 2;
  const others = [...container.querySelectorAll('.prod-item')];
  for (const other of others) {
    if (other === item) continue;
    const r = other.getBoundingClientRect();
    if (mid > r.top && mid < r.bottom) {
      const oMid = r.top + r.height / 2;
      if (mid < oMid) container.insertBefore(item, other);
      else container.insertBefore(item, other.nextSibling);
      dragState.startY = e.clientY;
      item.style.transform = 'translateY(0px)';
      break;
    }
  }
}
async function onDragEnd() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);
  if (!dragState) { isDragging = false; return; }
  const { item, container, handle, pointerId } = dragState;
  if (handle) { try { handle.releasePointerCapture(pointerId); } catch (_) {} }
  item.style.transform = ''; item.style.zIndex = ''; item.style.position = '';
  item.classList.remove('shadow-xl', 'opacity-90', 'ring-2', 'ring-blue-300');
  const ids = [...container.querySelectorAll('.prod-item')].map(el => el.dataset.id);
  dragState = null;
  buzz(15);
  await persistOrder(ids);
  isDragging = false;
}
async function persistOrder(ids) {
  const map = {}; products.forEach(p => map[p.id] = p);
  products = ids.map((id, i) => { const p = map[id]; if (p) p.orderIndex = i; return p; }).filter(Boolean);
  if (!db) return;
  const batch = writeBatch(db);
  ids.forEach((id, i) => batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { orderIndex: i }));
  await batch.commit().catch(console.error);
}
function startMove(id) { movingId = id; buzz(10); renderSettings(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function cancelMove() { movingId = null; renderSettings(); }
function applyMove(targetId, atEnd) {
  const moving = products.find(p => p.id === movingId);
  if (!moving) { movingId = null; renderSettings(); return; }
  const without = products.filter(p => p.id !== movingId);
  let insertAt;
  if (atEnd) insertAt = without.length;
  else { const ti = without.findIndex(p => p.id === targetId); insertAt = ti < 0 ? without.length : ti; }
  without.splice(insertAt, 0, moving);
  buzz(18);
  persistOrder(without.map(p => p.id));
  movingId = null;
  renderSettings();
  showToast('"' + moving.name + '" הועבר', null, null, 2000);
}
function renderMoveMode() {

// ===== קליטת תעודות =====
function todayStr() { return new Date().toLocaleDateString('en-CA'); }
function r2(n) { return Math.round((Number(n) || 0) * 100) / 100; }
function fmtMoney(n) { return r2(n).toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function isPromoActive(p, dateStr) {
  dateStr = dateStr || todayStr();
  const pr = p && p.promo;
  return !!(pr && pr.pct != null && pr.pct > 0 && pr.start && pr.end && dateStr >= pr.start && dateStr <= pr.end);
}
function promoMinQty(p) { const m = p && p.promo && p.promo.minQty; return (m && m > 1) ? m : 1; }
function effectivePrice(p, qty, dateStr) {
  if (!p) return 0;
  const base = Number(p.price) || 0;
  if (isPromoActive(p, dateStr) && (Number(qty) || 0) >= promoMinQty(p)) return r2(base * (1 - (Number(p.promo.pct) || 0) / 100));
  return r2(base);
}
function receiptTotals() {
  const day = todayStr();
  let ex = 0;
  receiptList.forEach(it => { const p = products.find(x => x.id === it.productId); ex += effectivePrice(p, it.qty, day) * it.qty; });
  ex = r2(ex);
  return { ex, inc: r2(ex * (1 + VAT)) };
}
function returnTotals(r) {
  if (r && (r.totalIncVat != null || r.totalExVat != null)) {
    const ex = r2(Number(r.totalExVat) || (Number(r.totalIncVat) || 0) / (1 + VAT));
    return { ex, inc: r2(r.totalIncVat != null ? r.totalIncVat : ex * (1 + VAT)) };
  }
  let ex = 0;
  ((r && r.items) || []).forEach(it => {
    let unit = Number(it.unitPrice);
    if (!(unit > 0)) { const p = products.find(x => (it.barcode && x.barcode === it.barcode) || x.name === it.name); unit = Number(p && p.price) || 0; }
    ex += unit * (Number(it.qty) || 0);
  });
  ex = r2(ex);
  return { ex, inc: r2(ex * (1 + VAT)) };
}

function finishReceipt() {

  const day = todayStr();
  const lines = receiptList.map(it => {
    const p = products.find(x => x.id === it.productId);
    const unit = effectivePrice(p, it.qty, day);
    const applied = isPromoActive(p, day) && it.qty >= promoMinQty(p);
    return { productId: it.productId, name: it.name || (p ? p.name : ''), barcode: it.barcode || (p ? p.barcode : '') || '', qty: it.qty, unitPrice: unit, lineTotal: r2(unit * it.qty), promoPct: (applied ? (Number(p.promo.pct) || 0) : 0) };
  });

    '<div class="flex items-center justify-between text-slate-600 font-bold mt-1"><span>מע"מ ' + Math.round(VAT * 100) + '%</span><span>₪' + fmtMoney(r2(inc - ex)) + '</span></div>' +
    '<div class="flex items-center justify-between text-slate-900 font-black text-xl mt-2 pt-2 border-t border-slate-200"><span>סה"כ לתשלום</span><span>₪' + fmtMoney(inc) + '</span></div>';

function hideReceiptSummary() { const m = $('receiptSummaryModal'); m.classList.add('hidden'); m.classList.remove('flex'); }

function calcReceiptRange() {
  const fromEl = $('rcFrom'), toEl = $('rcTo'), out = $('rcRangeResult');
  if (!out) return;
  const from = fromEl ? fromEl.value : '', to = toEl ? toEl.value : '';
  const fromT = from ? new Date(from + 'T00:00:00').getTime() : -Infinity;
  const toT = to ? new Date(to + 'T23:59:59').getTime() : Infinity;
  const recs = receipts.filter(r => r.timestamp >= fromT && r.timestamp <= toT);
  const rets = returns.filter(r => r.timestamp >= fromT && r.timestamp <= toT);
  const recEx = r2(recs.reduce((a, r) => a + (Number(r.totalExVat) || 0), 0));
  const recInc = r2(recs.reduce((a, r) => a + (Number(r.totalIncVat) || 0), 0));
  let retEx = 0, retInc = 0;
  rets.forEach(r => { const t = returnTotals(r); retEx += t.ex; retInc += t.inc; });
  retEx = r2(retEx); retInc = r2(retInc);
  const netEx = r2(recEx - retEx), netInc = r2(recInc - retInc);
  out.innerHTML =
    '<div class="text-[11px] font-bold text-amber-900/70 mb-2">' + recs.length + ' תעודות קליטה · ' + rets.length + ' תעודות חזרה</div>' +
    '<div class="flex items-center justify-between text-sm font-bold text-amber-900"><span>קליטה (כולל מע"מ)</span><span>₪' + fmtMoney(recInc) + '</span></div>' +
    '<div class="flex items-center justify-between text-sm font-bold text-emerald-700 mt-1"><span>חזרות / זיכוי</span><span>− ₪' + fmtMoney(retInc) + '</span></div>' +
    '<div class="flex items-center justify-between text-lg font-black text-amber-900 mt-1.5 pt-1.5 border-t border-amber-200"><span>נטו לתשלום</span><span>₪' + fmtMoney(netInc) + '</span></div>' +
    '<div class="text-[11px] text-amber-900/60 mt-1.5">ללא מע"מ — קליטה ₪' + fmtMoney(recEx) + ' · חזרות ₪' + fmtMoney(retEx) + ' · נטו ₪' + fmtMoney(netEx) + '</div>';
  out.classList.remove('hidden');
}

function refreshPricesList(q) {
  const box = $('pricesListEl'); if (!box) return;
  q = (q || '').trim();
  let list = products.slice().sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
  if (q) list = list.filter(p => (p.name || '').includes(q) || (p.barcode || '').includes(q));
  let head = '';
  if (q && /^\d{6,}$/.test(q) && !products.some(p => (p.barcode || '') === q)) {
    head = '<button data-role="pr-create" data-code="' + q + '" class="btn-tap w-full bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl py-3 font-black flex items-center justify-center gap-2 mb-1"><i class="fa-solid fa-plus"></i> צור מוצר חדש (ברקוד ' + q + ')</button>';
  }
  box.innerHTML = head + (list.length ? list.map(priceRowHtml).join('') : (q ? '<div class="text-center text-slate-400 py-8">לא נמצא מוצר</div>' : '<div class="text-center text-slate-400 py-8">אין מוצרים</div>'));
}
function savePrice(id, val) {
  const raw = (val || '').toString().replace(',', '.');
  const num = parseFloat(raw);
  const price = (raw.trim() === '') ? null : (num >= 0 ? r2(num) : null);
  const p = products.find(x => x.id === id); if (p) p.price = price;
  clearTimeout(priceTimers[id]);
  priceTimers[id] = setTimeout(() => { if (db) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { price }).catch(console.error); }, 600);
}
function openPriceScanner() { scanPurpose = 'price'; openScanner(); }

async function saveProd(again) {
  const name = ($('prod_name').value || '').trim();
  const barcode = ($('prod_barcode').value || '').trim();
  const raw = ($('prod_price').value || '').toString().replace(',', '.').trim();
  const num = parseFloat(raw);
  const price = (raw === '') ? null : (num >= 0 ? r2(num) : null);
  if (!name) { $('prod_name').focus(); return; }
  const id = priceEditId;
  hideProdModal();
  if (id) {
    const p = products.find(x => x.id === id);
    if (p) { p.name = name; p.barcode = barcode; p.price = price; }
    if (db) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { name, barcode, price }).catch(console.error);
  } else {
    const maxIdx = products.length ? Math.max(...products.map(p => p.orderIndex || 0)) : -1;
    let newId = 'prod_' + Date.now();
    const data = { name, barcode, price, average: 0, defaultUnit: 'carton', orderIndex: maxIdx + 1 };
    if (db) { try { const ref = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), data); newId = ref.id; } catch (e) { console.error(e); } }
    if (!products.find(x => x.id === newId)) { products.push({ id: newId, ...data }); orderState[newId] = orderState[newId] || { amount: '', unit: 'carton' }; }
  }
  if (currentView === 'prices') renderPrices();
  showToast(id ? 'המוצר עודכן' : 'המוצר נוסף', null, null, 1600);
  if (again) openPriceScanner();
}
function delProdFromModal() {
  const id = priceEditId; if (!id) { hideProdModal(); return; }
  const p = products.find(x => x.id === id);
  hideProdModal();
  showConfirm('מחיקת מוצר', 'למחוק את "' + (p ? p.name : '') + '"? פעולה זו תמחק אותו מכל המסכים.', 'מחק', () => delProduct(id));
}

function openPromoEditor(id) {
  const p = products.find(x => x.id === id); if (!p) return;
  promoEditId = id;
  $('promoName').textContent = p.name;
  const pr = p.promo || {};
  $('promoPct').value = (pr.pct != null ? pr.pct : '');
  $('promoStart').value = pr.start || todayStr();
  $('promoEnd').value = pr.end || '';
  $('promoMin').value = (pr.minQty != null && pr.minQty > 1) ? pr.minQty : '';
  $('promoRemove').classList.toggle('hidden', !(pr.pct != null && pr.pct > 0));
  const m = $('promoModal'); m.classList.remove('hidden'); m.classList.add('flex');
  setTimeout(() => { const i = $('promoPct'); if (i) i.focus(); }, 80);
}
function hidePromo() { const m = $('promoModal'); m.classList.add('hidden'); m.classList.remove('flex'); promoEditId = null; }
function savePromo() {
  const id = promoEditId; if (!id) { hidePromo(); return; }
  const pct = parseFloat(($('promoPct').value || '').toString().replace(',', '.'));
  const start = $('promoStart').value || '';
  const end = $('promoEnd').value || '';
  if (!(pct > 0) || !start || !end) { showToast('מלא אחוז, תאריך התחלה ותאריך סיום', null, null, 2600); return; }
  if (end < start) { showToast('תאריך הסיום חייב להיות אחרי ההתחלה', null, null, 2600); return; }
  const minRaw = parseInt(($('promoMin').value || '').replace(/[^0-9]/g, ''), 10);
  const minQty = (minRaw > 1) ? minRaw : 1;
  const promo = { pct: r2(pct), start, end, minQty };
  const p = products.find(x => x.id === id); if (p) p.promo = promo;
  hidePromo();
  if (db) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { promo }).catch(console.error);
  if (currentView === 'prices') renderPrices();
  showToast('המבצע נשמר', null, null, 1800);
}
function removePromo() {
  const id = promoEditId; if (!id) { hidePromo(); return; }
  const p = products.find(x => x.id === id); if (p) p.promo = null;
  hidePromo();
  if (db) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), { promo: null }).catch(console.error);
  if (currentView === 'prices') renderPrices();
  showToast('המבצע בוטל', null, null, 1800);
}

  const t = e.target; const role = t.getAttribute && t.getAttribute('data-role');
  if (t.id === 'returnsSearch') { renderReturnsResults(t.value); return; }
  if (t.id === 'priceSearch') { priceQuery = t.value; refreshPricesList(priceQuery); return; }

  if (role === 'amount') {
    const id = t.dataset.id; let v = t.value.replace(/[^0-9]/g, ''); if (v !== t.value) t.value = v;
    (orderState[id] = orderState[id] || { amount: '', unit: 'carton' }).amount = (v === '0' ? '' : v);

    clearTimeout(advanceTimer);

  else if (role === 'go-contacts') setView('contacts');
  else if (role === 'go-settings') setView('settings');
  else if (role === 'add-product') addProduct();
  else if (role === 'del-product') { const p = products.find(x => x.id === id); showConfirm('מחיקת מוצר', 'למחוק את "' + (p ? p.name : '') + '"?', 'מחק', () => delProduct(id)); }
  else if (role === 'toggle-hidden') toggleHidden(id);
  else if (role === 'move') startMove(id);
  else if (role === 'place-before') applyMove(id, false);
  else if (role === 'place-end') applyMove(null, true);
  else if (role === 'cancel-move') cancelMove();
  else if (role === 'add-contact') addContact();
  else if (role === 'del-contact') { const c = contacts.find(x => x.id === id); showConfirm('מחיקת איש קשר', 'למחוק את "' + (c ? c.name : '') + '"?', 'מחק', () => delContact(id)); }
  else if (role === 'resend') { const o = history.find(x => x.id === id); if (o) openResend(o); }
  else if (role === 'add-note') addNote();
  else if (role === 'done-note') doneNote(id);
  else if (role === 'ret-add') addReturn(id);
  else if (role === 'ret-scan') openReturnsScanner();
  else if (role === 'ret-plus') changeReturnQty(id, 1);
  else if (role === 'ret-minus') changeReturnQty(id, -1);
  else if (role === 'ret-remove') removeReturn(id);
  else if (role === 'edit-barcode') openBarcodePrompt(id, true);
  else if (role === 'credit') markCredited(id, true);
  else if (role === 'uncredit') markCredited(id, false);
  else if (role === 'clear-history') showConfirm('ניקוי היסטוריה', 'למחוק את כל היסטוריית ההזמנות? פעולה זו אינה הפיכה.', 'מחק הכל', () => clearAllDocs('history'));
  else if (role === 'clear-returns-history') showConfirm('ניקוי היסטוריה', 'למחוק את כל היסטוריית החזרות? פעולה זו אינה הפיכה.', 'מחק הכל', () => clearAllDocs('returns'));
  else if (role === 'rc-scan') openReceivingScanner();
  else if (role === 'rc-prices') setView('prices');
  else if (role === 'pr-scan') openPriceScanner();
  else if (role === 'pr-create') openProdModal(null, false, t.dataset.code);
  else if (role === 'edit-prod') { const p = products.find(x => x.id === id); if (p) openProdModal(p, false); }
  else if (role === 'rc-history') setView('receiptsHistory');
  else if (role === 'rc-plus') changeReceiptQty(id, 1);
  else if (role === 'rc-minus') changeReceiptQty(id, -1);
  else if (role === 'rc-remove') removeReceiptLine(id);
  else if (role === 'rc-calc') calcReceiptRange();
  else if (role === 'edit-promo') openPromoEditor(id);
  else if (role === 'del-receipt') { const rc = receipts.find(x => x.id === id); showConfirm('מחיקת תעודה', 'למחוק את התעודה' + (rc ? ' מ-' + new Date(rc.timestamp).toLocaleDateString('he-IL') : '') + '?', 'מחק', () => delReceipt(id)); }
  else if (role === 'clear-receipts') showConfirm('ניקוי תעודות', 'למחוק את כל תעודות הקליטה? פעולה זו אינה הפיכה.', 'מחק הכל', () => clearAllDocs('receipts'));
});

// ===== מצב כהה =====
function applyDarkIcon() { const on = document.documentElement.classList.contains('dark'); $('darkIcon').className = on ? 'fa-solid fa-sun' : 'fa-solid fa-moon'; }
applyDarkIcon();
$('btnDark').addEventListener('click', () => { const on = document.documentElement.classList.toggle('dark'); try { localStorage.setItem('yt_dark', on ? '1' : '0'); } catch (e) {} applyDarkIcon(); });

// ===== סטטוס רשת =====
function setOnlineUI() {
  isOnline = navigator.onLine;
  $('onlineDot').className = 'inline-flex rounded-full h-2.5 w-2.5 ' + (isOnline ? 'bg-green-400 shadow-[0_0_6px_rgba(74,222,128,.8)]' : 'bg-red-400');
  $('onlineText').textContent = isOnline ? 'מחובר' : 'לא מחובר';
}
window.addEventListener('online', setOnlineUI);
window.addEventListener('offline', setOnlineUI);
setOnlineUI();

// ===== Service Worker =====
if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); }); }
</script>
</body>
